  {l:"מבחני עבר", q:"<strong>Based on Belsky (בלסקי) 2016 \"genetics of success\", which is NOT true regarding the polygenic score for educational attainment (הישגיות חינוכית)?</strong><br>a) Composed of large number of genetic variants, each with small contribution<br>b) Predicts personality traits such as self-control<br>c) Predicts health outcomes such as heart disease and high blood pressure<br>d) Predicts reading levels in childhood<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> לפי Belsky (בלסקי) 2016, מה לא נכון לגבי הציון הפוליגני להישגיות חינוכית?<br>א) מורכב מהרבה וריאנטים בעלי תרומה קטנה ב) מנבא תכונות אישיות כמו שליטה עצמית ג) מנבא תוצאות בריאות כמו מחלות לב ולחץ דם ד) מנבא רמת קריאה בילדות</span>", a:"<strong>תשובה: c) Predicts health outcomes</strong><br><br><strong>הסבר:</strong> בלסקי מצא שהציון הפוליגני לחינוך מנבא הישגים, אישיות וקריאה אבל <strong>לא</strong> תוצאות בריאות. כל השאר אומתו במחקר."},
  {l:"מבחני עבר", q:"<strong>(Kong (קונג) et al. 2018) Examining polygenic scores for educational attainment (הישגיות חינוכית), researchers measured 'genetic nurturing' by examining correlation between child's educational attainment (הישגיות חינוכית) and:</strong><br>a) Their parent's polygenic score<br>b) Allele (אלל)s contributing to parents polygenic score that were NOT transmitted to the child<br>c) Allele (אלל)s transmitted to the child<br>d) Their parents' educational attainment (הישגיות חינוכית)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Kong (קונג) 2018) מדדו 'genetic nurturing' ע\"י קורלציה בין הישגיות הילד ובין:<br>א) הציון הפוליגני של ההורים ב) אללים של ההורים שלא הועברו לילד ג) אללים שהועברו לילד ד) השכלת ההורים</span>", a:"<strong>תשובה: b) Allele (אלל)s NOT transmitted to the child</strong><br><br><strong>הסבר:</strong> זה הטוויסט הגאוני - אם <strong>אללים שלא הועברו לילד</strong> מנבאים את ההישגים שלו, זה מוכיח השפעה <strong>סביבתית</strong> של ההורים (genetic nurturing) ולא ירושה ישירה."},
  {l:"מבחני עבר", q:"<strong>Alexander & Fisher (אלכסנדר ופישר) 'bogus pipeline (פוליגרף מזויף)' experiment - sex differences (הבדלי מין) between males and females in mate preferences and casual sex are due to:</strong><br>a) Testosterone (טסטוסטרון) levels<br>b) Socialization processes<br>c) Genetic effects<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> ניסוי ה-bogus pipeline (פוליגרף מזויף) של Alexander & Fisher (אלכסנדר ופישר) - הבדלי מין בהעדפות זוגיות ומין מזדמן נובעים מ:<br>א) רמות טסטוסטרון ב) תהליכי חיברות (סוציאליזציה) ג) השפעות גנטיות</span>", a:"<strong>תשובה: b) Socialization processes</strong><br><br><strong>הסבר:</strong> ב-bogus pipeline (פוליגרף מזויף) אומרים לנבדקים שמכונת פוליגרף מזהה שקרים. במצב זה ההבדלים בין גברים לנשים <strong>נעלמים</strong> - מה שמראה שהם נובעים מ<strong>נורמות חברתיות</strong> (נשים מתביישות לדווח על מין מזדמן) ולא מביולוגיה."},
  {l:"מבחני עבר", q:"<strong>The gender equality paradox: countries that rank highest in national surveys of gender equality (e.g. Finland, Sweden) often have the ___ differences between males and females in personality traits.</strong><br>a) Largest<br>b) Smallest<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> פרדוקס שוויון המגדרי - מדינות המובילות בשוויון מגדרי (פינלנד, שבדיה) יש להן הבדלים __ בין גברים לנשים בתכונות אישיות:<br>א) הגדולים ביותר ב) הקטנים ביותר</span>", a:"<strong>תשובה: a) Largest</strong><br><br><strong>הסבר:</strong> פרדוקס שוויון המגדרי - דווקא במדינות עם הכי הרבה שוויון, ההבדלים האישיותיים בין המינים גדולים יותר. הסבר אפשרי: בחירה חופשית מאפשרת לכל אחד לבטא את הנטיות הביולוגיות שלו, בלי לחץ חברתי שמשטח את ההבדלים."},
  {l:"מבחני עבר", q:"<strong>(Brunner (ברונר) Dutch family) Which claim is correct regarding the antisocial (אנטי-חברתי) behavior?</strong><br>a) Effect was due to a rare mutation in MAOa gene<br>b) Effect was only present in females<br>c) Effect was only present in males because gene is on Y chromosome<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (משפחת ברונר הולנדית) מה נכון לגבי ההתנהגות האנטי-חברתית?<br>א) בגלל מוטציה נדירה בגן MAOa ב) רק אצל נשים ג) רק אצל גברים כי הגן על כרומוזום Y</span>", a:"<strong>תשובה: a) Rare mutation in MAOa gene</strong><br><br><strong>הסבר:</strong> סינדרום ברונר - מוטציה נדירה (החלפת C ב-T) שמשתיקה את MAOa. הגן <strong>על כרומוזום X</strong> (לא Y!). גברים מושפעים יותר כי יש להם רק עותק אחד; נשים נשאיות עם 2 עותקים מוגנות."},
  {l:"מבחני עבר", q:"<strong>Charlie and Jim are identical twins. When Charlie was 8, he fell down running and broke his leg, leading him to develop interest in sports. This is an example of:</strong><br>a) Effect of genes<br>b) Effect of the shared environment (סביבה משותפת)<br>c) Effect of the unshared environment (סביבה משותפת) (סביבה לא משותפת)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> צ'רלי וג'ים הם תאומים זהים. כשצ'רלי היה בן 8 הוא שבר רגל וזה הביא להתעניינות בספורט. זו דוגמה ל:<br>א) השפעת גנים ב) השפעת סביבה משותפת ג) השפעת סביבה לא משותפת</span>", a:"<strong>תשובה: c) Effect of unshared environment (סביבה משותפת) (סביבה לא משותפת)</strong><br><br><strong>הסבר:</strong> רק צ'רלי שבר את הרגל - זו חוויה ייחודית שלא חלוקה עם אחיו התאום הזהה. לכן: <strong>סביבה לא משותפת</strong>. כל אירוע שקורה רק לאחד מהתאומים נכנס ל-e²."},
  {l:"מבחני עבר", q:"<strong>The rs671 polymorphism (alcohol flushing (סומק)) - which is NOT correct?</strong><br>a) Polymorphism (פולימורפיזם) related to rate at which alcohol is metabolized<br>b) Polymorphism (פולימורפיזם) related to risk for alcohol dependence<br>c) Polymorphism (פולימורפיזם) present across all cultures<br>d) Polymorphism (פולימורפיזם) related to risk for esophageal cancer (סרטן הוושט)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> פולימורפיזם rs671 (סומק מאלכוהול) - מה לא נכון?<br>א) קשור לקצב פירוק אלכוהול ב) קשור לסיכון התמכרות לאלכוהול ג) קיים בכל התרבויות ד) קשור לסיכון לסרטן ושט</span>", a:"<strong>תשובה: c) Present across all cultures</strong><br><br><strong>הסבר:</strong> המוטציה <strong>לא</strong> אוניברסלית - היא נפוצה בעיקר ב<strong>אסיה המזרחית</strong>. זה ההיסטוריה האבולוציונית - מוטציה שהופיעה באוכלוסייה מסוימת. כל היתר נכון."},
  {l:"מבחני עבר", q:"<strong>Which claim regarding the central dogma (הדוגמה המרכזית) of molecular genetics is correct?</strong><br>a) Introns (אינטרונים) are not transcribed<br>b) RNA (רנ\"א), unlike DNA (דנ\"א), has the nucleotide (נוקלאוטיד) thymine (T)<br>c) Every 3 nucleotide (נוקלאוטיד) bases specify one amino acid (חומצת אמינו)<br>d) Each amino acid (חומצת אמינו) can be translated from one and only one combination of nucleotide (נוקלאוטיד)s<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזו טענה נכונה לגבי הדוגמה המרכזית של גנטיקה מולקולרית?<br>א) אינטרונים לא משועתקים ב) ל-RNA (רנ\"א) יש את הנוקלאוטיד T בניגוד ל-DNA (דנ\"א) ג) כל 3 בסיסים מקודדים חומצת אמינו אחת ד) כל חומצת אמינו מתורגמת מקומבינציה אחת ויחידה</span>", a:"<strong>תשובה: c) Every 3 nucleotide (נוקלאוטיד) bases specify one amino acid (חומצת אמינו)</strong><br><br><strong>הסבר:</strong> זה הקודון - 3 נוקלאוטידים → חומצת אמינו אחת. a לא נכון (אינטרונים כן משועתקים, רק נחתכים אחר כך). b לא נכון (RNA (רנ\"א) יש U במקום T). d לא נכון (קוד גנטי מנוון - יותר מקודון אחד יכול לקודד אותה חומצה)."},
  {l:"מבחני עבר", q:"<strong>(Dekovic & Janssens (יאנסנס) (דקוביץ' ויאנסנס)) ___ who show a more authoritative (סמכותי) parenting style had children who showed ___ levels of prosocial (פרו-חברתי) behavior.</strong><br>a) Fathers, lower<br>b) Fathers, higher<br>c) Mothers, lower<br>d) Mothers, higher<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Dekovic & Janssens (יאנסנס) (דקוביץ' ויאנסנס)) __ עם סגנון הורות יותר סמכותי, היו להם ילדים עם רמת התנהגות פרו-סוציאלית __:<br>א) אבות, נמוכה ב) אבות, גבוהה ג) אמהות, נמוכה ד) אמהות, גבוהה</span>", a:"<strong>תשובה: d) Mothers, higher</strong><br><br><strong>הסבר:</strong> אמהות סמכותיות (חמות + דורשניות) → ילדים <strong>פרו-סוציאליים יותר</strong>. אצל אבות זה פחות בלט - אבות סמכותניים (קרים + דורשניים) קושרו עם פחות פרו-סוציאליות."},
  {l:"מבחני עבר", q:"<strong>(Judith Harris (הריס) - Nurture Assumption (הנחת הגידול) critique) What was a main criticism?</strong><br>a) Socialization findings can be accounted for by genetic similarity (דמיון גנטי) between parents and children<br>b) Socialization theory neglects that differences in parenting may be a response to child's personality<br>c) Twin studies show very low influence (often close to zero) for shared environment (סביבה משותפת)<br>d) All of the above<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (ביקורת ג'ודית הריס על ה-Nurture Assumption (הנחת הגידול)) מהי ביקורת מרכזית?<br>א) ממצאי סוציאליזציה יכולים להיות מוסברים ע\"י דמיון גנטי הורה-ילד ב) תיאוריית סוציאליזציה מתעלמת מכך שהבדלים בהורות יכולים להיות תגובה לאישיות הילד ג) מחקרי תאומים מראים השפעה נמוכה מאוד לסביבה משותפת ד) כל הנ\"ל</span>", a:"<strong>תשובה: d) All of the above</strong><br><br><strong>הסבר:</strong> כל הביקורות האלה הועלו ע\"י הריס: 1) הקורלציה הורים-ילדים נובעת מגנים משותפים. 2) הילד משפיע על ההורות (כיוון סיבתיות הפוך). 3) מחקרי תאומים מראים ~0 לסביבה משותפת."},
  {l:"מבחני עבר", q:"<strong>(Boardman (בורדמן)) Large social factors influence heritability (תורשתיות). States with social control on alcohol access (e.g. high taxes) most likely show ___ heritability (תורשתיות) of drinking compared to states where alcohol is easier to get.</strong><br>a) Increases<br>b) Decreases<br>c) Does not influence<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Boardman (בורדמן)) גורמים חברתיים גדולים משפיעים על תורשתיות. מדינות עם בקרה על אלכוהול (מס גבוה) צפויות להראות __ תורשתיות שתייה לעומת מדינות בלי בקרה:<br>א) גבוהה יותר ב) נמוכה יותר ג) לא משפיע</span>", a:"<strong>תשובה: b) Decreases</strong><br><br><strong>הסבר:</strong> כשיש הגבלות סביבתיות חזקות - הסביבה תופסת חלק יותר גדול מהשונות, והגנים פחות באים לידי ביטוי. <strong>תורשתיות יורדת</strong>. כשהסביבה מתירה הכל - יותר חופש לגנים להתבטא."},
  {l:"מבחני עבר", q:"<strong>(Caspi (קספי) MAOa) Which genotype (גנוטיפ) matched higher vulnerability (פגיעות) to childhood maltreatment (התעללות)?</strong><br>a) Long allele, higher metabolism/breakdown of serotonin (סרוטונין)<br>b) Short allele, higher metabolism<br>c) Long allele, lower metabolism<br>d) Short allele, lower metabolism<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Caspi (קספי) MAOa) איזה גנוטיפ קושר עם פגיעות גבוהה יותר להתעללות בילדות?<br>א) אלל ארוך, פירוק סרוטונין גבוה ב) אלל קצר, פירוק גבוה ג) אלל ארוך, פירוק נמוך ד) אלל קצר, פירוק נמוך</span>", a:"<strong>תשובה: d) Short allele, lower metabolism/breakdown</strong><br><br><strong>הסבר:</strong> אלל קצר של MAOa = <strong>פחות אנזים</strong> שמפרק נוירוטרנסמיטרים → רמות גבוהות יותר של סרוטונין/דופמין → קושי בוויסות → רגישות מוגברת להתעללות → התנהגות אנטי-סוציאלית."},
  {l:"מבחני עבר", q:"<strong>(Boardman (בורדמן) 2nd study) The change in heritability (תורשתיות) of smoking (עישון) as function of state-level policies (cigarette taxes (מס סיגריות)) is an example of:</strong><br>a) Gene-environment interaction<br>b) Active gene environment correlation<br>c) Evocative gene environment correlation<br>d) The role of unshared environment (סביבה משותפת) (סביבה לא משותפת) on cigarette consumption<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Boardman (בורדמן) 2) השינוי בתורשתיות עישון כפונקציה של מדיניות מדינתית (מס סיגריות) הוא דוגמה ל:<br>א) אינטראקציית גן-סביבה ב) קורלציית גן-סביבה אקטיבית ג) קורלציית גן-סביבה מעוררת ד) תפקיד הסביבה הלא-משותפת בעישון</span>", a:"<strong>תשובה: a) Gene-environment interaction</strong><br><br><strong>הסבר:</strong> כשהאפקט של הגנים <strong>תלוי בסביבה</strong> (במדינה זו השפעה גנטית גבוהה, באחרת נמוכה) - זו אינטראקציה GxE. לא מדובר בקורלציה (איך הגנים גורמים לסביבה) אלא איך הסביבה משנה את ביטוי הגנים."},
  {l:"מבחני עבר", q:"<strong>(Fraga (פראגה) et al.) Examining epigenetic (אפיגנטי) profiles of MZ twins (תאומים זהים) in Spain - at what age were methylation profiles MOST similar?</strong><br>a) Age 3<br>b) Age 80<br>c) Equally similar at both ages<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Fraga (פראגה) et al.) במחקר אפיגנטי על תאומי MZ בספרד - באיזה גיל פרופילי המתילציה היו הכי דומים?<br>א) גיל 3 ב) גיל 80 ג) דומים באותה מידה בשני הגילים</span>", a:"<strong>תשובה: a) Age 3</strong><br><br><strong>הסבר:</strong> בילדות תאומים זהים חולקים סביבה דומה ועוד לא צברו חוויות אישיות שמשפיעות על אפיגנטיקה. עם הגיל - הם <strong>מתפצלים</strong> אפיגנטית. דוגמה ל-divergence epigenetic (אפיגנטי)."},
  {l:"מבחני עבר", q:"<strong>Individuals who committed suicide but do NOT have a history of childhood abuse are about the same in their methylation levels of glucocorticoid (גלוקוקורטיקואידים) receptor as:</strong><br>a) Individuals who committed suicide and have history of abuse<br>b) Individuals who died from other causes (e.g. car accident)<br>c) Both A and B<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> אנשים שהתאבדו ולא היה להם רקע של התעללות בילדות, ברמות מתילציה של GR (רצפטור גלוקוקורטיקואידים) דומים ל:<br>א) מתאבדים שעברו התעללות ב) אנשים שמתו מסיבות אחרות (תאונות דרכים) ג) שניהם, A וגם B</span>", a:"<strong>תשובה: b) Individuals who died from other causes</strong><br><br><strong>הסבר:</strong> רק קבוצה אחת בלטה - מתאבדים <strong>עם</strong> היסטוריית התעללות. השאר (מתאבדים בלי + מתים מסיבות אחרות) דומים. ההתעללות בילדות היא הגורם המרכזי - לא ההתאבדות עצמה."},
  {l:"מבחני עבר", q:"<strong>Assume DRD4 (רצפטור דופמין 4) variant influences child's temperament (טמפרמנט) so they are more hyperactive (היפראקטיבי), which influences type of parenting they receive. Is this gene-environment interaction (GxE)?</strong><br>a) Yes<br>b) No<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> נניח וריאנט DRD4 (רצפטור דופמין 4) משפיע על הטמפרמנט של הילד שיהיה היפראקטיבי יותר, וזה משפיע על סוג ההורות שהוא מקבל. האם זה GxE (אינטראקציית גן-סביבה)?<br>א) כן ב) לא</span>", a:"<strong>תשובה: b) No</strong><br><br><strong>הסבר:</strong> זה <strong>קורלציה</strong> (rGE) ולא אינטראקציה (GxE)! ספציפית - <strong>Evocative rGE</strong>: ההתנהגות שמושפעת מהגנים גוררת תגובות סביבתיות מסוימות. GxE = הסביבה ממתנת אפקט גן (שונה!)."},
  {l:"מבחני עבר", q:"<strong>Telomeres (טלומרים) are:</strong><br>a) Genes coding for chromosomal caps<br>b) DNA (דנ\"א) sequences at the end of chromosomes (כרומוזומים)<br>c) Proteins responsible for the aging process<br>d) Enzymes (אנזימים) responsible for metabolism of antibiotics<br>e) All of the above<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> טלומרים הם:<br>א) גנים המקודדים מכסים כרומוזומליים ב) רצפי DNA (דנ\"א) בקצוות הכרומוזומים ג) חלבונים אחראים על הזדקנות ד) אנזימים האחראים על פירוק אנטיביוטיקה ה) כל הנ\"ל</span>", a:"<strong>תשובה: b) DNA (דנ\"א) sequences at end of chromosomes (כרומוזומים)</strong><br><br><strong>הסבר:</strong> טלומרים = <strong>רצפי DNA (דנ\"א)</strong> חזרתיים (TTAGGG) בקצוות. הם <strong>לא</strong> גנים (לא מקודדים חלבון) ולא חלבונים. טלומראז זה האנזים, טלומר זה הרצף עצמו."},
  {l:"מבחני עבר", q:"<strong>(Shalev (שלו)) Children aged 5-10 exposed to violence (אלימות):</strong><br>a) Did not show reduction in telomere length between 5 and 10<br>b) Exposed to more than one incident had shorter telomeres at age 10<br>c) Exposed to only one incident telomeres shorten with age<br>d) Answers B and C correct<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Shalev (שלו)) ילדים בני 5-10 שנחשפו לאלימות:<br>א) לא הראו ירידה בטלומר בין 5 ל-10 ב) חשופים ליותר מאירוע אחד - טלומרים קצרים בגיל 10 ג) חשופים לאירוע יחיד - טלומרים מתקצרים עם הגיל ד) תשובות B ו-C נכונות</span>", a:"<strong>תשובה: d) Both B and C correct</strong><br><br><strong>הסבר:</strong> מחקר Shalev (שלו) הראה אפקט מצטבר - <strong>חשיפות מרובות</strong> לאלימות גרמו לקיצור מואץ של טלומרים בתקופה של 5 שנים. גם חשיפה בודדת קיצרה אבל פחות."},
  {l:"מבחני עבר", q:"<strong>(De Dreu (דה-דרו) et al.) Intranasal oxytocin in intergroup prisoner's dilemma (דילמת האסיר) - subjects receiving oxytocin:</strong><br>a) Were less likely to punish out-group (קבוצה חיצונית) (lower out-group (קבוצה חיצונית) hate)<br>b) Were more likely to contribute to in-group (קבוצה פנימית) pool (greater in-group (קבוצה פנימית) love)<br>c) Were more likely to punish out-group (קבוצה חיצונית) (greater out-group (קבוצה חיצונית) hate)<br>d) Were less likely to contribute to in-group (קבוצה פנימית) (lower in-group (קבוצה פנימית) love)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (De Dreu (דה-דרו)) אוקסיטוצין בדילמת האסיר הבין-קבוצתית - מקבלי אוקסיטוצין:<br>א) פחות נטו להעניש קבוצה חיצונית (פחות שנאה לחוץ) ב) יותר תרמו לקופת הקבוצה הפנימית (יותר אהבה פנימית) ג) יותר נטו להעניש (יותר שנאה לחוץ) ד) פחות תרמו לקבוצה הפנימית</span>", a:"<strong>תשובה: b) More likely to contribute to in-group (קבוצה פנימית) pool</strong><br><br><strong>הסבר:</strong> אוקסיטוצין מגביר <strong>אהבה לקבוצה הפנימית</strong> (in-group (קבוצה פנימית) love), אבל <strong>לא</strong> שנאה לקבוצה החיצונית. הצד השלילי הוא Bias-מ favoritism (העדפת קבוצה), לא תוקפנות אקטיבית."},
  {l:"מבחני עבר", q:"<strong>Which is NOT a defining characteristic of autism spectrum disorders (ASD (אוטיזם))?</strong><br>a) Impairments in social interactions<br>b) Impairments in communication (speech, language)<br>c) Impairments in cognitive (קוגניטיבי) ability (e.g. IQ (מנת משכל))<br>d) Restricted and repetitive patterns of interest or behavior<br>e) All of the above are characteristic<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה לא מאפיין מגדיר של אוטיזם (ASD (אוטיזם))?<br>א) ליקוי באינטראקציות חברתיות ב) ליקוי בתקשורת (דיבור, שפה) ג) ליקוי ביכולת קוגניטיבית (IQ (מנת משכל)) ד) דפוסים חוזרים ומוגבלים ה) כל הנ\"ל מאפיינים</span>", a:"<strong>תשובה: c) Impairments in cognitive (קוגניטיבי) ability</strong><br><br><strong>הסבר:</strong> אוטיזם <strong>לא</strong> מאופיין בהכרח בליקוי קוגניטיבי. יש אוטיסטים בעלי IQ (מנת משכל) גבוה (אספרגר, תפקוד גבוה). 3 התחומים הקלאסיים: חברתי, תקשורת, דפוסים חוזרים."},
  {l:"מבחני עבר", q:"<strong>Twin and adoption studies show that the shared environment (סביבה משותפת) plays a significant role in aggressive behavior.</strong><br>a) True<br>b) False<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מחקרי תאומים ואימוץ מראים שלסביבה המשותפת תפקיד משמעותי בהתנהגות תוקפנית.<br>א) נכון ב) לא נכון</span>", a:"<strong>תשובה: b) False</strong><br><br><strong>הסבר:</strong> דווקא בתוקפנות סביבה משותפת תורמת ~10-20% (חריג! - אחד התחומים הבודדים שיש בו השפעה משמעותית). אבל ברוב התכונות - סביבה משותפת ~0. תלוי בהגדרה של \"משמעותי\" - ובהקשר השאלה התשובה False כי בד\"כ הסביבה הלא-משותפת חזקה יותר."},
  {l:"מבחני עבר", q:"<strong>From the political ideology twin study graph - effects of shared environment (סביבה משותפת):</strong><br>a) Are largest before age 20<br>b) Are only evident from age 20 and up<br>c) Are about the same throughout development<br>d) Are only evident for males, but not females<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מהגרף של תאומים ואידיאולוגיה פוליטית - אפקטים של סביבה משותפת:<br>א) הגדולים ביותר לפני גיל 20 ב) נראים רק מגיל 20 ומעלה ג) דומים לאורך כל ההתפתחות ד) נראים רק אצל גברים, לא נשים</span>", a:"<strong>תשובה: a) Largest before age 20</strong><br><br><strong>הסבר:</strong> עד גיל ~20, סביבה משותפת חזקה (חיים בבית עם ההורים, אותו בית ספר). אחרי גיל 20 - האדם עוזב את הבית, וסביבה משותפת פוחתת דרמטית. גנים תופסים את מקומה."},
  {l:"מבחני עבר", q:"<strong>Political attitudes show high degree of assortative mating. Over multiple generations, what effect should this have on heritability (תורשתיות) of political attitudes (עמדות פוליטיות)?</strong><br>a) It should decrease heritability (תורשתיות)<br>b) It should increase heritability (תורשתיות)<br>c) It will not affect heritability (תורשתיות)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> עמדות פוליטיות מראות assortative mating גבוה. לאורך כמה דורות, מה האפקט על תורשתיות העמדות?<br>א) תורשתיות תרד ב) תורשתיות תעלה ג) ללא השפעה</span>", a:"<strong>תשובה: b) It should increase heritability (תורשתיות)</strong><br><br><strong>הסבר:</strong> Assortative mating (זיווג סלקטיבי) חיובי = אנשים דומים מתחתנים → ילדיהם הומוזיגוטים יותר → השונות הגנטית באוכלוסייה <strong>גדלה</strong> בכל דור → <strong>תורשתיות עולה</strong>. מאורגן באוכלוסיה לפנוטיפים קיצוניים."},
  {l:"מבחני עבר", q:"<strong>(Oxley (אוקסלי) et al.) Individuals who respond with greater skin conductance after seeing a scary picture of a spider are more likely to support ___ policies that protect the in-group (קבוצה פנימית).</strong><br>a) Social<br>b) Economic<br>c) Social and economic<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Oxley (אוקסלי)) אנשים עם הולכה עורית גבוהה יותר אחרי תמונת עכביש מפחידה נוטים יותר לתמוך במדיניות __ שמגינה על הקבוצה הפנימית:<br>א) חברתית ב) אקונומית ג) חברתית ואקונומית</span>", a:"<strong>תשובה: a) Social</strong><br><br><strong>הסבר:</strong> אוקסלי מצא קשר רק לעמדות <strong>חברתיות</strong> (צבא, עונש מוות, הגירה) - לא לעמדות <strong>אקונומיות</strong>. תגובה פיזיולוגית חזקה לאיום → תמיכה במדיניות מתגוננת חברתית."},
  {l:"מבחני עבר", q:"<strong>Which curve best describes heritability (תורשתיות) of IQ (מנת משכל) as function of childhood SES (מצב סוציואקונומי) in the US? (curve 1 increases with SES (מצב סוציואקונומי), 2 stays flat, 3 decreases)</strong><br>a) Curve 1<br>b) Curve 2<br>c) Curve 3<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזו עקומה מתארת תורשתיות IQ (מנת משכל) כפונקציה של SES (מצב סוציואקונומי) בילדות בארה\"ב? (1=עולה, 2=שטוחה, 3=יורדת)<br>א) עקומה 1 ב) עקומה 2 ג) עקומה 3</span>", a:"<strong>תשובה: a) Curve 1 (increases)</strong><br><br><strong>הסבר:</strong> בארה\"ב - תורשתיות IQ (מנת משכל) <strong>עולה</strong> עם SES (מצב סוציואקונומי). בסביבה עשירה (משאבים זמינים) הגנים יכולים להתבטא לחלוטין. בסביבה ענייה - חוסר משאבים מגביל את הביטוי הגנטי, וסביבה משותפת תופסת יותר חלק."},
  {l:"מבחני עבר", q:"<strong>(Belsky (בלסקי) polygenic score) Which is NOT true?</strong><br>a) Predicts differences in educational attainment (הישגיות חינוכית) between siblings<br>b) Correlated with interpersonal skills<br>c) Predictability is limited to US alone<br>d) Predicts personal income even after controlling for educational attainment (הישגיות חינוכית)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (ציון פוליגני בלסקי) מה לא נכון?<br>א) מנבא הבדלים בהשכלה בין אחים ב) מתואם עם כישורים בין-אישיים ג) ניבוי מוגבל רק לארה\"ב ד) מנבא הכנסה אישית גם אחרי שליטה על השכלה</span>", a:"<strong>תשובה: c) Predictability limited to US alone</strong><br><br><strong>הסבר:</strong> בלסקי הראה ניבוי גם בניו זילנד ובמדינות נוספות - <strong>לא</strong> מוגבל לארה\"ב. כל היתר נמצאו: ניבוי בין אחים, כישורים אישיים, ניבוי הכנסה גם אחרי בקרה על השכלה."},
  {l:"מבחני עבר", q:"<strong>(Three panels showing genotype (גנוטיפ) A,B,C,D → phenotype (פנוטיפ) W,X,Y,Z)<br>Panel 1: A→X (one to one)<br>Panel 2: A→W,X,Y,Z (one to many)<br>Panel 3: A,B,C,D ↔ W,X,Y,Z (many to many)<br>Which best describes most complex traits (תכונות מורכבות) (intelligence, personality, political attitudes (עמדות פוליטיות), autism)?</strong><br>a) Panel 1<br>b) Panel 2<br>c) Panel 3<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (3 פאנלים גנוטיפ→פנוטיפ) פאנל 1: אחד-לאחד; פאנל 2: אחד-להרבה; פאנל 3: הרבה-להרבה. איזה מתאר תכונות מורכבות (אינטליגנציה, אישיות, עמדות פוליטיות, אוטיזם)?<br>א) פאנל 1 ב) פאנל 2 ג) פאנל 3</span>", a:"<strong>תשובה: c) Panel 3 (many-to-many)</strong><br><br><strong>הסבר:</strong> תכונות מורכבות מושפעות מ<strong>הרבה גנים</strong> (פוליגנים) ו<strong>כל גן משפיע על הרבה תכונות</strong> (פליוטרופיה). זה הדפוס הטיפוסי ב-GWAS (סקירת אסוציאציות בכל הגנום)."},
  {l:"מבחני עבר", q:"<strong>The figure shows distributions of cognitive (קוגניטיבי) ability for men vs women. Which graph describes the Male Variability Hypothesis (השערת השונות הגברית)?</strong><br>a) Both have same distribution (graph A)<br>b) Same mean, men have wider distribution (graph B)<br>c) Different means, same width (graph C)<br>d) Men higher mean, narrower distribution (graph D)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזה גרף מתאר את השערת השונות הגברית?<br>א) גרף A - אותה התפלגות לשני המינים ב) גרף B - אותו ממוצע, גברים בעלי שונות רחבה יותר ג) גרף C - ממוצעים שונים, אותה רוחב ד) גרף D - גברים עם ממוצע גבוה יותר והתפלגות צרה יותר</span>", a:"<strong>תשובה: b) Same mean, men have wider distribution</strong><br><br><strong>הסבר:</strong> Male Variability Hypothesis (השערת השונות הגברית) - <strong>אותו ממוצע</strong> אבל לגברים שונות גדולה יותר. זה מסביר למה יש יותר גברים בשני הקצוות (יותר גאונים <strong>וגם</strong> יותר עם מוגבלויות) באוכלוסיות מסוימות."},
  {l:"מבחני עבר", q:"<strong>(Andari (אנדרי) et al. ASD (אוטיזם) ball-tossing game) What was the effect of intranasal oxytocin?</strong><br>a) ASD (אוטיזם) individuals under oxytocin showed improvement in trust (אמון)ing and choosing to pass to 'good players'<br>b) No effect of oxytocin on ASD (אוטיזם)<br>c) Oxytocin (אוקסיטוצין) made ASD (אוטיזם) worse<br>d) Healthy subjects improved more than ASD (אוטיזם)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Andari (אנדרי)) משחק זריקת כדור באוטיסטים - מה השפעת אוקסיטוצין?<br>א) אוטיסטים תחת OT השתפרו באמון ובבחירה להעביר ל\"שחקנים טובים\" ב) ללא השפעה ג) OT החמיר את ASD (אוטיזם) ד) בריאים השתפרו יותר מ-ASD (אוטיזם)</span>", a:"<strong>תשובה: a) ASD (אוטיזם) improved in trust (אמון)ing good players</strong><br><br><strong>הסבר:</strong> תחת אוקסיטוצין - אוטיסטים בתפקוד גבוה למדו <strong>להבחין</strong> בין שחקנים טובים (שמחזירים את הכדור) לרעים (שלא), והעבירו יותר לטובים. תחת פלצבו - הם חילקו אקראית לכולם."},
  {l:"מבחני עבר", q:"<strong>What does \"genetic nurturing\" refer to?</strong><br>a) Genes that the parents pass to their children that influence parenting behavior<br>b) Genes in the parents that influence the child's environment, even when not transmitted<br>c) Direct genetic effects on child's intelligence<br>d) Sibling interactions<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> למה מתייחס \"genetic nurturing\" (טיפוח גנטי)?<br>א) גנים שההורים מעבירים שמשפיעים על התנהגות הורית ב) גנים אצל ההורים שמשפיעים על הסביבה של הילד, גם אם לא הועברו ג) השפעות גנטיות ישירות על אינטליגנציה ד) אינטראקציות בין אחים</span>", a:"<strong>תשובה: b) Parental genes affecting child's environment even when not transmitted</strong><br><br><strong>הסבר:</strong> Genetic nurturing (טיפוח גנטי) - גנים של ההורים שמשפיעים על הסביבה שהם יוצרים לילד (קריאה, עידוד), גם אם הגנים האלה <strong>לא</strong> עברו לילד. זו השפעה סביבתית של הגנים ההוריים."},
  {l:"מבחני עבר", q:"<strong>The figure shows correlations between MZ and DZ twins (תאומים לא זהים) for 3 phenotype (פנוטיפ)s. Phenotype (פנוטיפ) A: MZ=0.5, DZ=0.5; Phenotype (פנוטיפ) B: MZ=0.4, DZ=0.2; Phenotype (פנוטיפ) C: MZ=0.5, DZ=0.4. Based on the figure, which phenotype (פנוטיפ) is the MOST heritable?</strong><br>a) Phenotype (פנוטיפ) A<br>b) Phenotype (פנוטיפ) B<br>c) Phenotype (פנוטיפ) C<br>d) Heritability (תורשתיות) is the same across all 3 phenotype (פנוטיפ)s<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> הגרף מציג קורלציות תאומי MZ ו-DZ ל-3 פנוטיפים. פנוטיפ A: MZ=0.5, DZ=0.5; פנוטיפ B: MZ=0.4, DZ=0.2; פנוטיפ C: MZ=0.5, DZ=0.4. איזה פנוטיפ הכי תורשתי?<br>א) פנוטיפ A ב) פנוטיפ B ג) פנוטיפ C ד) תורשתיות זהה לכולם</span>", a:"<strong>תשובה: b) Phenotype (פנוטיפ) B</strong><br><br><strong>הסבר:</strong> משתמשים בנוסחה <strong>h² = 2(rMZ (קורלציית תאומים זהים) - rDZ (קורלציית תאומים לא זהים))</strong>:<br>• A: 2(0.5-0.5) = 0<br>• <strong>B: 2(0.4-0.2) = 0.4 (הגבוה ביותר!)</strong><br>• C: 2(0.5-0.4) = 0.2<br><br>פנוטיפ A תורשתיות 0 (כל ההשפעה מסביבה משותפת). ההפרש הגדול ביותר בין MZ ל-DZ = יותר גנטי."},
  {l:"מבחני עבר", q:"<strong>Based on the same figure (MZ=0.5/DZ=0.5; MZ=0.4/DZ=0.2; MZ=0.5/DZ=0.4), which phenotype (פנוטיפ) is MOST influenced by the SHARED environment?</strong><br>a) Phenotype (פנוטיפ) A<br>b) Phenotype (פנוטיפ) B<br>c) Phenotype (פנוטיפ) C<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> לפי אותו גרף, איזה פנוטיפ הכי מושפע מסביבה <em>משותפת</em>?<br>א) פנוטיפ A ב) פנוטיפ B ג) פנוטיפ C</span>", a:"<strong>תשובה: a) Phenotype (פנוטיפ) A</strong><br><br><strong>הסבר:</strong> משתמשים בנוסחה <strong>c² = rMZ (קורלציית תאומים זהים) - h²</strong> (או רואים שכאשר rMZ (קורלציית תאומים זהים) = rDZ (קורלציית תאומים לא זהים) → אין הבדל גנטי, הכל סביבה משותפת):<br>• <strong>A: rMZ (קורלציית תאומים זהים)=rDZ (קורלציית תאומים לא זהים)=0.5 → h²=0, c²=0.5 (הגבוה!)</strong><br>• B: c²=0<br>• C: c²=0.3<br><br>כשהקורלציה בין MZ ו-DZ זהה, השונות נובעת מסביבה משותפת בלבד."},
  {l:"מבחני עבר", q:"<strong>Based on the same figure, which phenotype (פנוטיפ) is MOST influenced by the UNSHARED environment?</strong><br>a) Phenotype (פנוטיפ) A<br>b) Phenotype (פנוטיפ) B<br>c) Phenotype (פנוטיפ) C<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> לפי אותו גרף, איזה פנוטיפ הכי מושפע מסביבה <em>לא משותפת</em>?<br>א) פנוטיפ A ב) פנוטיפ B ג) פנוטיפ C</span>", a:"<strong>תשובה: b) Phenotype (פנוטיפ) B</strong><br><br><strong>הסבר:</strong> משתמשים בנוסחה <strong>e² = 1 - rMZ (קורלציית תאומים זהים)</strong>:<br>• A: e² = 1-0.5 = 0.5<br>• <strong>B: e² = 1-0.4 = 0.6 (הגבוה!)</strong><br>• C: e² = 1-0.5 = 0.5<br><br>ככל ש-rMZ (קורלציית תאומים זהים) נמוך יותר - יש יותר השפעה של סביבה לא משותפת (כי תאומים זהים נבדלים זה מזה רק בגלל סביבה לא משותפת)."},
  {l:"מבחני עבר", q:"<strong>In the town of Footloose, dancing is banned, so only a few brave individuals attend underground dance parties. In Flashdance, dancing is allowed and encouraged. In which town would we expect HIGHER heritability (תורשתיות) for the trait \"Saturday night fever\" (fondness for dancing), and why?</strong><br>a) Footloose - only a select group brave enough attend, and they are the ones who love dancing<br>b) Flashdance - dancing is so prevalent, people who enjoy dancing go out instead of staying home<br>c) Both towns would show same heritability (תורשתיות), since heritability (תורשתיות) is not affected by environment<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> בעיר Footloose - ריקודים אסורים. בעיר Flashdance - מותר ומעודדים. באיזו עיר נצפה לתורשתיות גבוהה יותר ל\"קדחת מסיבות שבת\" (אהבת ריקוד), ולמה?<br>א) Footloose - רק האמיצים יוצאים והם אלה שאוהבים לרקוד ב) Flashdance - הריקוד כל כך נפוץ, מי שאוהב יוצא במקום להישאר בבית ג) שתי הערים יראו תורשתיות זהה, סביבה לא משפיעה על תורשתיות</span>", a:"<strong>תשובה: b) Flashdance</strong><br><br><strong>הסבר:</strong> כשהסביבה <strong>מתירה את הבחירה</strong> - הביטוי הגנטי בא לידי ביטוי. בFlashdance כל אחד יכול לבחור לפי הנטייה הגנטית שלו → תורשתיות גבוהה. בFootloose - הסביבה מגבילה ולכן הסביבה מסבירה את ההתנהגות (לא הגנים). כמו מחקר Boardman (בורדמן) עם מס על סיגריות."},
  {l:"מבחני עבר", q:"<strong>(Andari (אנדרי) et al. - ball tossing game) The graph shows ball tossing patterns of 3 groups: G1 throws relatively evenly, G2 throws more to 'Good' player, G3 throws less discriminately. Which group matches each label: 1=?, 2=?, 3=?</strong><br>a) 1=Healthy, 2=ASD (אוטיזם) oxytocin, 3=ASD (אוטיזם) placebo<br>b) 1=Healthy, 2=ASD (אוטיזם) placebo, 3=ASD (אוטיזם) oxytocin<br>c) 1=ASD (אוטיזם) oxytocin, 2=ASD (אוטיזם) placebo, 3=Healthy<br>d) 1=ASD (אוטיזם) oxytocin, 2=Healthy, 3=ASD (אוטיזם) placebo<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Andari (אנדרי)) הגרף מציג זריקות כדור של 3 קבוצות: G1 זורק יחסית שווה לכולם, G2 זורק יותר לשחקן טוב, G3 לא מבחין. איזו קבוצה מתאימה לכל תיוג?<br>א) 1=בריא, 2=ASD (אוטיזם)+OT, 3=ASD (אוטיזם)+פלצבו ב) 1=בריא, 2=ASD (אוטיזם)+פלצבו, 3=ASD (אוטיזם)+OT ג) 1=ASD (אוטיזם)+OT, 2=ASD (אוטיזם)+פלצבו, 3=בריא ד) 1=ASD (אוטיזם)+OT, 2=בריא, 3=ASD (אוטיזם)+פלצבו</span>", a:"<strong>תשובה: a) 1=Healthy, 2=ASD (אוטיזם) oxytocin, 3=ASD (אוטיזם) placebo</strong><br><br><strong>הסבר:</strong> בריאים מבחינים בין שחקנים טובים לרעים (אך לא קיצוני). אוטיסטים תחת אוקסיטוצין משתפרים ומבחינים בין הטובים לרעים (קרוב לבריאים). אוטיסטים תחת פלצבו מחלקים אקראית - לא מבחינים."},
  {l:"מבחני עבר", q:"<strong>(Terburg (טרבורג) et al. - testosterone (טסטוסטרון) administration) The researchers found that:</strong><br>a) The effects of testosterone (טסטוסטרון) were automatic and not conscious<br>b) Testosterone (טסטוסטרון) decreased the amount of time subjects stared at angry people in the face<br>c) Testosterone (טסטוסטרון) affected self-reported mood, particularly anger<br>d) All of the above<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Terburg (טרבורג) - החדרת טסטוסטרון) החוקרים מצאו ש:<br>א) אפקט הטסטוסטרון היה אוטומטי ולא מודע ב) טסטוסטרון הפחית את הזמן שהביטו בפנים כועסות ג) טסטוסטרון השפיע על מצב רוח מדווח, במיוחד כעס ד) כל הנ\"ל</span>", a:"<strong>תשובה: a) Effects were automatic and not conscious</strong><br><br><strong>הסבר:</strong> טסטוסטרון השפיע על המבט באופן אוטומטי - הסתכלו <strong>יותר זמן</strong> על פנים כועסות (לא פחות, לכן b שגוי). על מצב הרוח הסובייקטיבי <strong>לא</strong> היה אפקט (לכן c שגוי). הנקודה החשובה - האפקטים <strong>תת-מודעים</strong>."},
  {l:"מבחני עבר", q:"<strong>(Kosfeld (קוספלד) et al.) In the Trust Game (משחק האמון), the researchers found that intranasal oxytocin increased the amount of funds that investors (משקיעים - שחקן ראשון) (first player) EXPECTED TO RECEIVE (שונות סביבתית) back from trust (אמון)ees (second player).</strong><br>a) True<br>b) False<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Kosfeld (קוספלד)) במשחק האמון, החוקרים מצאו שהסנפת אוקסיטוצין הגדילה את סכום הכסף שמשקיעים (שחקן ראשון) ציפו לקבל בחזרה מנאמנים (שחקן שני).<br>א) נכון ב) לא נכון</span>", a:"<strong>תשובה: b) False</strong><br><br><strong>הסבר:</strong> אוקסיטוצין הגביר את הנדיבות של ה<strong>משקיעים</strong> בנתינה - אבל לא את הציפייה שלהם להחזרה. לא היה הבדל בכמה הם חשבו שיקבלו בחזרה - מה ששינה היה האמון בעצם הנתינה."},
  {l:"מבחני עבר", q:"<strong>Social support is more often sought by ___ and is more often provided by ___:</strong><br>a) women, women<br>b) men, men<br>c) women, men<br>d) men, women<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> תמיכה חברתית מבוקשת לעיתים קרובות יותר ע\"י __ ומסופקת לעיתים קרובות יותר ע\"י __:<br>א) נשים, נשים ב) גברים, גברים ג) נשים, גברים ד) גברים, נשים</span>", a:"<strong>תשובה: a) women, women</strong><br><br><strong>הסבר:</strong> מחקרים מראים שנשים גם <strong>מבקשות</strong> תמיכה חברתית יותר, וגם <strong>מספקות</strong> אותה יותר. זה תומך בתיאוריית Tend and Befriend (טפל והתחבר) של טיילור. גם נמצא שלנשים תמיכה חברתית משפיעה יותר על אריכות חיים."},
  {l:"מבחני עבר", q:"<strong>(Epel (אפל) et al. \"Accelerated telomere shortening in response to life stress (לחץ חיים)\") Mothers of chronically ill children compared to mothers in control group had telomeres that were ___:</strong><br>a) shorter<br>b) longer<br>c) about the same length<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Epel (אפל) - \"קיצור טלומרים מואץ בתגובה ללחץ\") אמהות לילדים חולים כרוניים, בהשוואה לקבוצת ביקורת, היו להן טלומרים __:<br>א) קצרים יותר ב) ארוכים יותר ג) באותו אורך</span>", a:"<strong>תשובה: a) shorter</strong><br><br><strong>הסבר:</strong> מחקר Epel (אפל) המפורסם - אמהות לילדים חולים כרוניים סובלות מלחץ ממושך, וזה מתבטא בטלומרים <strong>קצרים יותר</strong>. ככל שטיפלו יותר שנים בילד החולה - הטלומרים קצרים יותר."},
  {l:"מבחני עבר", q:"<strong>The Caspi (קספי) 2005 study findings of MAOa interaction with childhood maltreatment (התעללות) - what gene variant matched higher VULNERABILITY?</strong><br>a) Long allele, higher metabolism/breakdown of serotonin (סרוטונין)<br>b) Short allele, higher metabolism<br>c) Long allele, lower metabolism<br>d) Short allele, lower metabolism<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> במחקר Caspi (קספי) 2005 על MAOa והתעללות, איזה וריאנט גנטי תאם פגיעות גבוהה יותר?<br>א) אלל ארוך, פירוק סרוטונין גבוה ב) אלל קצר, פירוק גבוה ג) אלל ארוך, פירוק נמוך ד) אלל קצר, פירוק נמוך</span>", a:"<strong>תשובה: d) Short allele, lower metabolism</strong><br><br><strong>הסבר:</strong> אלל קצר של MAOa = פחות אנזים פעיל = פירוק <strong>נמוך יותר</strong> של סרוטונין/דופמין/נוראפינפרין. בשילוב עם התעללות → התנהגות אנטי-סוציאלית. אלל ארוך מגן (יותר אנזים, פירוק תקין)."},
  {l:"מבחני עבר", q:"<strong>(Insel & Young (אינסל ויאנג)) Comparing prairie (ערבות) voles (נברנים) and montane voles (נברנים) - which key difference explains the monogamous (מונוגמית behavior of prairie (ערבות) voles (נברנים)?</strong><br>a) Higher levels of oxytocin in the blood<br>b) Different distribution of oxytocin and vasopressin receptors in the brain<br>c) Larger brains overall<br>d) Different neurotransmitter pathways for memory<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Insel & Young (אינסל ויאנג)) בהשוואת נברני ערבות לנברני הר - איזה הבדל מסביר את ההתנהגות המונוגמית של ערבות?<br>א) רמות OT גבוהות יותר בדם ב) פיזור שונה של רצפטורי OT ו-AVP (שונות פנוטיפית כוללת) (וזופרסין) במוח ג) מוח גדול יותר ד) מסלולים שונים לזיכרון</span>", a:"<strong>תשובה: b) Different distribution of receptors in the brain</strong><br><br><strong>הסבר:</strong> רמות ההורמון עצמן <strong>דומות</strong> בין שני הסוגים. ההבדל הוא ב<strong>מיקום ובכמות הרצפטורים</strong> - אצל prairie (ערבות) voles (נברנים) יש יותר רצפטורים באזורי גמול (דופמינרגיים), ולכן זיווג מתגמל יותר ומוביל למונוגמיה."},
  {l:"מבחני עבר", q:"<strong>The example of the German/Dutch family with antisocial (אנטי-חברתי) behavior in many male children showed that the cause was:</strong><br>a) A common variant of the MAOa gene present in the population<br>b) A rare mutation in the MAOa gene<br>c) Environmental abuse passed across generations<br>d) De novo mutations in each generation<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> הדוגמה של המשפחה הגרמנית/הולנדית עם התנהגות אנטי-חברתית אצל גברים הראתה שהסיבה הייתה:<br>א) וריאנט נפוץ של MAOa ב) מוטציה נדירה ב-MAOa ג) התעללות סביבתית שעוברת בין דורות ד) מוטציות de novo (חדש - מוטציה ספונטנית) בכל דור</span>", a:"<strong>תשובה: b) A rare mutation in the MAOa gene</strong><br><br><strong>הסבר:</strong> סינדרום ברונר - מוטציה <strong>נדירה</strong> (החלפת C ב-T) שגרמה לעצירה מוקדמת ולחוסר תפקוד של MAOa. זו לא וריאציה נפוצה אלא מוטציה ספציפית במשפחה זו. הגן על כרומוזום X - לכן השפיע יותר על גברים."},
  {l:"מבחני עבר", q:"<strong>Which is NOT a typical finding regarding gene-environment interaction studies (5HTTLPR (גן הטרנספורטר לסרוטונין) + life stress (לחץ חיים))?</strong><br>a) Individuals with short allele + many stressful events (אירועים מלחיצים) have higher depression (דיכאון)<br>b) The genotype (גנוטיפ) alone (without stress) significantly predicts depression (דיכאון)<br>c) Individuals with long/long are relatively protected from depression (דיכאון) even under stress<br>d) Number of stressful events (אירועים מלחיצים) alone correlates with depression (דיכאון)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה לא ממצא טיפוסי במחקרי GxE (5HTTLPR (גן הטרנספורטר לסרוטונין) + לחץ חיים)?<br>א) נשאי אלל קצר + אירועים מלחיצים = יותר דיכאון ב) הגנוטיפ לבד (ללא לחץ) מנבא דיכאון ג) ארוך/ארוך - מוגנים יחסית מדיכאון אפילו תחת לחץ ד) מספר אירועי לחץ לבדם בקורלציה עם דיכאון</span>", a:"<strong>תשובה: b) Genotype (גנוטיפ) alone significantly predicts depression (דיכאון)</strong><br><br><strong>הסבר:</strong> נקודה קריטית במחקר Caspi (קספי) - <strong>אין אפקט עצמאי לגנוטיפ</strong>. רק האינטראקציה עם לחץ סביבתי גרמה לדיכאון. אנשים עם אלל קצר ללא אירועים קשים - לא דיכאוניים יותר מאחרים."},
  {l:"מבחני עבר", q:"<strong>According to research on epigenetic (אפיגנטי) transmission across generations:</strong><br>a) Stress (לחץ) effects on parents are fully passed to all subsequent generations<br>b) Some epigenetic (אפיגנטי) effects may persist across 1-2 generations but evidence is debated<br>c) Epigenetic marks are completely erased in germ cells (תאי מין) (תאים), never passing<br>d) Only paternal lineages show epigenetic (אפיגנטי) transmission<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> לפי מחקר על מעבר אפיגנטי בין דורות:<br>א) השפעות לחץ על הורים עוברות במלואן לכל הדורות הבאים ב) חלק מהאפקטים נשמרים 1-2 דורות, אך הראיות שנויות במחלוקת ג) סמנים אפיגנטיים נמחקים לחלוטין בתאי מין, ולא עוברים ד) רק שושלות אבהיות מראות מעבר אפיגנטי</span>", a:"<strong>תשובה: b) Some effects across 1-2 generations but debated</strong><br><br><strong>הסבר:</strong> דוגמאות: רעב הולנדי 1944 - גם ילדים וגם נכדים נולדו קטנים. עכברי אגוטי - אפקט קל בדור הבא. אבל ההנחה הביולוגית שתאי מין עוברים מחיקה - לכן נושא שנוי במחלוקת."},
  {l:"מבחני עבר", q:"<strong>Heritability (תורשתיות) of intelligence varies by socioeconomic (סוציואקונומי) status (SES (מצב סוציואקונומי)). In the US, in low-SES (מצב סוציואקונומי) families, the contribution of ___ is greater, while in high-SES (מצב סוציואקונומי) families, the contribution of ___ is greater.</strong><br>a) Genes / Shared environment<br>b) Shared environment / Genes<br>c) Unshared environment (סביבה משותפת) / Shared environment<br>d) Genes / Unshared environment (סביבה משותפת)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> תורשתיות אינטליגנציה משתנה לפי SES (מצב סוציואקונומי). בארה\"ב, ב-SES (מצב סוציואקונומי) נמוך - תרומת __ גדולה יותר, ב-SES (מצב סוציואקונומי) גבוה - תרומת __ גדולה יותר:<br>א) גנים / סביבה משותפת ב) סביבה משותפת / גנים ג) סביבה לא משותפת / סביבה משותפת ד) גנים / סביבה לא משותפת</span>", a:"<strong>תשובה: b) Shared environment / Genes</strong><br><br><strong>הסבר:</strong> ב-SES (מצב סוציואקונומי) נמוך - הסביבה היא הגורם המגביל (חוסר משאבים), ולכן <strong>סביבה משותפת</strong> מסבירה את רוב השונות. ב-SES (מצב סוציואקונומי) גבוה - יש מספיק משאבים לכולם, ולכן <strong>הגנים</strong> באים לידי ביטוי. זה עקרון יסוד - גנטיקה דורשת סביבה תומכת כדי להתבטא."}
];

let currentIdx = 0;
let filteredCards = [...cards];
let activeFilter = 'all';
let viewingMarked = 'all'; // 'all', 'unknown'
let marks = JSON.parse(localStorage.getItem('flashcardMarks') || '{}');

function getCardKey(card) {
  return card.l + '|' + card.q.substring(0, 50);
}

function buildFilters() {
  const lessons = [...new Set(cards.map(c => c.l))];
  const row = document.getElementById('filterRow');
  let html = '<button class="filter-btn active" onclick="filterByLesson(\'all\')">הכל (' + cards.length + ')</button>';
  lessons.forEach(l => {
    const count = cards.filter(c => c.l === l).length;
    html += '<button class="filter-btn" onclick="filterByLesson(\'' + l + '\')">' + l + ' (' + count + ')</button>';
  });
  row.innerHTML = html;
}

function filterByLesson(lesson) {
  activeFilter = lesson;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function applyFilters() {
  filteredCards = cards.filter(c => {
    if (activeFilter !== 'all' && c.l !== activeFilter) return false;
    if (viewingMarked === 'unknown') {
      const key = getCardKey(c);
      if (marks[key] !== 'unknown') return false;
    }
    return true;
  });
  currentIdx = 0;
  renderCard();
  updateStats();
}

function showOnlyUnknown() { viewingMarked = 'unknown'; applyFilters(); }
function showAll() { viewingMarked = 'all'; applyFilters(); }

function renderCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  if (filteredCards.length === 0) {
    document.getElementById('frontText').innerHTML = 'אין כרטיסיות בסינון הנוכחי 🎉';
    document.getElementById('frontTag').textContent = '';
    document.getElementById('backText').innerHTML = '';
    document.getElementById('progress').textContent = '0 / 0';
    return;
  }
  const c = filteredCards[currentIdx];
  document.getElementById('frontTag').textContent = c.l;
  document.getElementById('backTag').textContent = c.l + ' • תשובה';
  document.getElementById('frontText').innerHTML = c.q;
  document.getElementById('backText').innerHTML = c.a;
  document.getElementById('progress').textContent = (currentIdx + 1) + ' / ' + filteredCards.length;
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').disabled = currentIdx === filteredCards.length - 1;

  // Mark buttons state
  const key = getCardKey(c);
  document.getElementById('markKnownBtn').classList.toggle('active', marks[key] === 'known');
  document.getElementById('markUnknownBtn').classList.toggle('active', marks[key] === 'unknown');
}

function flipCard() { document.getElementById('card').classList.toggle('flipped'); }

function nextCard() {
  if (currentIdx < filteredCards.length - 1) { currentIdx++; renderCard(); }
}
function prevCard() {
  if (currentIdx > 0) { currentIdx--; renderCard(); }
}

function shuffleCards() {
  for (let i = filteredCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
  }
  currentIdx = 0;
  renderCard();
}

function markCard(status) {
  if (filteredCards.length === 0) return;
  const c = filteredCards[currentIdx];
  const key = getCardKey(c);
  if (marks[key] === status) {
    delete marks[key]; // toggle off
  } else {
    marks[key] = status;
  }
  localStorage.setItem('flashcardMarks', JSON.stringify(marks));
  updateStats();
  renderCard();
  // auto-advance on mark
  if (status === 'known' && currentIdx < filteredCards.length - 1) {
    setTimeout(() => nextCard(), 300);
  }
}

function resetMarks() {
  if (!confirm('לאפס את כל הסימונים?')) return;
  marks = {};
  localStorage.removeItem('flashcardMarks');
  updateStats();
  renderCard();
}

function updateStats() {
  let known = 0, unknown = 0;
  cards.forEach(c => {
    const key = getCardKey(c);
    if (marks[key] === 'known') known++;
    else if (marks[key] === 'unknown') unknown++;
  });
  document.getElementById('totalCount').textContent = cards.length;
  document.getElementById('knownCount').textContent = known;
  document.getElementById('unknownCount').textContent = unknown;
  document.getElementById('leftCount').textContent = cards.length - known - unknown;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') nextCard();   // RTL: left = next
  else if (e.key === 'ArrowRight') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  else if (e.key === '1') markCard('unknown');
  else if (e.key === '2') markCard('known');
});

buildFilters();
renderCard();
updateStats();
</script>
</body>
</html>

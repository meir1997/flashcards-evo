<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>כרטיסיות - תורשה וסביבה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Arial Hebrew', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    color: white;
    text-align: center;
    margin-bottom: 10px;
    font-size: 2em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  .subtitle { color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 20px; }
  .stats {
    background: rgba(255,255,255,0.95);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.8em; font-weight: bold; color: #667eea; }
  .stat-label { font-size: 0.85em; color: #666; }
  .controls {
    background: rgba(255,255,255,0.95);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .filter-btn {
    padding: 8px 14px;
    border: 2px solid #667eea;
    background: white;
    color: #667eea;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85em;
    transition: all 0.2s;
    font-family: inherit;
  }
  .filter-btn:hover { background: #f0f0ff; }
  .filter-btn.active { background: #667eea; color: white; }
  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .action-btn {
    padding: 10px 20px;
    border: none;
    background: #764ba2;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9em;
    font-family: inherit;
    transition: all 0.2s;
  }
  .action-btn:hover { background: #5d3a82; transform: translateY(-2px); }
  .action-btn.secondary { background: #888; }
  .action-btn.secondary:hover { background: #666; }
  .card-wrapper { perspective: 1500px; margin: 20px 0; }
  .card {
    position: relative;
    width: 100%;
    min-height: 380px;
    cursor: pointer;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    min-height: 380px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 30px 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
  }
  .card-front {
    background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
    border: 3px solid #667eea;
  }
  .card-back {
    background: linear-gradient(135deg, #fff8f0 0%, #ffeed4 100%);
    border: 3px solid #f59e0b;
    transform: rotateY(180deg);
  }
  .card-tag {
    display: inline-block;
    background: #667eea;
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.75em;
    margin-bottom: 15px;
    align-self: flex-start;
  }
  .card-back .card-tag { background: #f59e0b; }
  .card-q {
    font-size: 1.3em;
    font-weight: 600;
    line-height: 1.5;
    color: #2d3748;
  }
  .card-a {
    font-size: 1em;
    line-height: 1.7;
    color: #2d3748;
  }
  .card-a strong { color: #b45309; }
  .card-hint {
    text-align: center;
    color: #999;
    font-size: 0.8em;
    margin-top: 20px;
    font-style: italic;
  }
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border: none;
    background: white;
    color: #667eea;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1em;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: all 0.2s;
    font-family: inherit;
  }
  .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
  .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress {
    background: rgba(255,255,255,0.95);
    padding: 8px 15px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
    color: #667eea;
    min-width: 100px;
  }
  .mark-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .mark-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9em;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mark-btn.know { border-color: #10b981; color: #10b981; }
  .mark-btn.know:hover, .mark-btn.know.active { background: #10b981; color: white; }
  .mark-btn.dont-know { border-color: #ef4444; color: #ef4444; }
  .mark-btn.dont-know:hover, .mark-btn.dont-know.active { background: #ef4444; color: white; }
  .empty-state {
    background: white;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    color: #666;
  }
  @media (max-width: 600px) {
    .card-face { padding: 20px 20px; }
    .card-q { font-size: 1.1em; }
    h1 { font-size: 1.5em; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>כרטיסיות - תורשה וסביבה</h1>
  <p class="subtitle">לחץ על כרטיסיה כדי להפוך אותה • סנן לפי שיעור • סמן מה שידעת</p>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">סה"כ</div></div>
    <div class="stat"><div class="stat-num" id="knownCount" style="color:#10b981">0</div><div class="stat-label">ידוע</div></div>
    <div class="stat"><div class="stat-num" id="unknownCount" style="color:#ef4444">0</div><div class="stat-label">לחזור</div></div>
    <div class="stat"><div class="stat-num" id="leftCount" style="color:#888">0</div><div class="stat-label">לא נבדק</div></div>
  </div>

  <div class="controls">
    <div class="filter-row" id="filterRow"></div>
    <div class="action-row">
      <button class="action-btn" onclick="shuffleCards()">🔀 ערבב</button>
      <button class="action-btn" onclick="resetMarks()">🔄 איפוס סימון</button>
      <button class="action-btn secondary" onclick="showOnlyUnknown()">📌 רק "לחזור"</button>
      <button class="action-btn secondary" onclick="showAll()">📚 הצג הכל</button>
    </div>
  </div>

  <div id="cardArea">
    <div class="card-wrapper">
      <div class="card" id="card" onclick="flipCard()">
        <div class="card-face card-front">
          <span class="card-tag" id="frontTag">שיעור</span>
          <div class="card-q" id="frontText">טוען...</div>
          <div class="card-hint">לחץ כדי לראות תשובה</div>
        </div>
        <div class="card-face card-back">
          <span class="card-tag" id="backTag">תשובה</span>
          <div class="card-a" id="backText"></div>
          <div class="card-hint">לחץ כדי לחזור לשאלה</div>
        </div>
      </div>
    </div>

    <div class="mark-row">
      <button class="mark-btn dont-know" id="markUnknownBtn" onclick="markCard('unknown')">❌ לא ידעתי</button>
      <button class="mark-btn know" id="markKnownBtn" onclick="markCard('known')">✓ ידעתי</button>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()">← הקודם</button>
      <div class="progress" id="progress">0 / 0</div>
      <button class="nav-btn" id="nextBtn" onclick="nextCard()">הבא →</button>
    </div>
  </div>
</div>

<script>
const cards = [
  // שיעור 1 - מבוא
  {l:"שיעור 1", q:"מהי אינטליגנציה מקיאווליאנית (Machiavellian (מקיאווליאני) intelligence)?", a:"<strong>הבנה</strong> של סיטואציות וכוונות של אחרים, ושימוש בהן להישרדות. תיאוריה שמסבירה מדוע התפתחה אצל בני אדם יכולת חברתית מורכבת."},
  {l:"שיעור 1", q:"מהי השערת המוח החברתי של דנבר (Dunbar (דנבר))?", a:"היכולת להבין סימנים מאחרים מאפשרת לשרוד. נמצאה <strong>קורלציה חיובית</strong> בין יחס הניאו-קורטקס לשאר המוח לבין גודל הקבוצה החברתית. בני אדם נמצאים בפינה הימנית העליונה. הגבול אצל האדם המודרני: <strong>200-250 איש</strong>."},
  {l:"שיעור 1", q:"מה המקרה של הגבר עם הגידול במוח?", a:"גבר בן 40 פיתח עניין בפורנו ילדים והתעלל בבתו. נמצא לו גידול גדול ב<strong>אונה האורביטו-פרונטלית</strong>. לאחר הוצאת הגידול - התפקודים השתפרו. ממחיש שהתנהגות חברתית מונעת מביולוגיה."},
  {l:"שיעור 1", q:"מהו ברונר סינדרום (התנהגות גנטית)?", a:"משפחה גרמנית עם תופעת אגרסיביות אצל רוב הגברים. נמצאו רמות גבוהות של סרוטונין וכמעט ללא <strong>MAOA</strong> (אנזים שמפרק סרוטונין, נמצא בכרומוזום X). מוטציה החליפה C ב-T. נשים נשאיות בלבד כי יש להן עותק תקין נוסף."},
  {l:"שיעור 1", q:"מהי ההבחנה בין Altricial (לא-מפותח-בלידה) ל-Precocial (מפותח-בלידה)?", a:"<strong>Altricial (לא-מפותח-בלידה)</strong>: לא נולדים מוכנים לשרוד (כמו בני אדם, לא יכולים לזוז). <strong>Precocial (מפותח-בלידה)</strong>: נולדים מוכנים וניידים (כמו סוס). בני אדם - היריון יחסית ארוך (268 ימים), והתינוק נולד ב-6% מהגודל הבוגר."},
  {l:"שיעור 1", q:"מהי תופעת ה-Exaptation (התרחבות תפקיד)?", a:"התרחבות של תכונה למטרה אחרת. דוגמה: <strong>כנפי ציפורים</strong> שימשו במקור לוויסות חום, ובשלב מסוים הפכו לתעופה. אצל אדם - יכולת אמפתיה התרחבה מהאם-תינוק לקשרים אחרים."},

  // שיעור 2 - תורשה
  {l:"שיעור 2", q:"מהו פנוטיפ?", a:"<strong>המאפיינים הנראים</strong> (observable characteristics) של האורגניזם: מורפולוגיה, התפתחות, מאפיינים ביוכימיים או פיזיולוגיים."},
  {l:"שיעור 2", q:"מהי הנוסחה הבסיסית של תורשה (Heritability (תורשתיות))?", a:"<strong>h² = VG (שונות גנטית) / VP (שונות פנוטיפית כוללת)</strong><br><br><strong>מרכיבי הנוסחה:</strong><br>• <strong>h²</strong> = Heritability (תורשתיות) - תורשתיות (בריבוע)<br>• <strong>VG (שונות גנטית)</strong> = Genetic Variance - השונות הגנטית באוכלוסייה<br>• <strong>VP (שונות פנוטיפית כוללת)</strong> = Total Phenotypic Variance - השונות הכוללת בפנוטיפ<br><br>בנוסף: <strong>VP (שונות פנוטיפית כוללת) = VG (שונות גנטית) + VE (שונות סביבתית)</strong> (VE (שונות סביבתית) = Environmental Variance)<br><br>נע בין 0 (שפה - רק נרכש) ל-1 (תכונות מנדליות כמו אנמיה). מודד <strong>כמה שונות באוכלוסייה</strong> מוסברת ע\"י הגנטיקה - לא כמה גנטי משהו."},
  {l:"שיעור 2", q:"מהי נוסחת פלקונר (Falconer (פלקונר)'s Formula)?", a:"<strong>1 = h² + c² + e²</strong><br><br><strong>מרכיבי הנוסחה:</strong><br>• <strong>h²</strong> = שונות תורשתית (תורשה בריבוע) - חלק השונות שמוסבר ע\"י הגנים<br>• <strong>c²</strong> = Common/Shared environment - שונות סביבה <strong>משותפת</strong> בריבוע (בית, ביה\"ס, חברים משותפים)<br>• <strong>e²</strong> = Error/Unshared environment (סביבה משותפת) - שונות סביבה <strong>לא משותפת</strong> בריבוע (חוויות ייחודיות + שגיאת מדידה)<br><br>הסכום שווה ל-1 כי יחד הם מסבירים 100% מהשונות הפנוטיפית."},
  {l:"שיעור 2", q:"איך מחשבים h² מקורלציות תאומים?", a:"<strong>h² = 2(rMZ (קורלציית תאומים זהים) - rDZ (קורלציית תאומים לא זהים))</strong><br><br><strong>מרכיבי הנוסחה:</strong><br>• <strong>rMZ (קורלציית תאומים זהים)</strong> = קורלציה בין תאומים <strong>זהים</strong> (Monozygotic) - חולקים 100% גנים<br>• <strong>rDZ (קורלציית תאומים לא זהים)</strong> = קורלציה בין תאומים <strong>לא זהים</strong> (Dizygotic) - חולקים 50% גנים<br><br><strong>הגזירה:</strong><br>• rMZ (קורלציית תאומים זהים) = h² + c² (חולקים את כל הגנים ואת הסביבה)<br>• rDZ (קורלציית תאומים לא זהים) = h²/2 + c² (חולקים חצי גנים ואת הסביבה)<br>• rMZ (קורלציית תאומים זהים) - rDZ (קורלציית תאומים לא זהים) = h²/2<br>• ולכן: h² = 2(rMZ (קורלציית תאומים זהים) - rDZ (קורלציית תאומים לא זהים))<br><br>ההיגיון: כפל ההפרש ב-2 כי DZ חולקים רק חצי גנים."},
  {l:"שיעור 2", q:"מה החישוב של c² ו-e²?", a:"<strong>c² = rMZ (קורלציית תאומים זהים) - h²</strong> (סביבה משותפת)<br><strong>e² = 1 - rMZ (קורלציית תאומים זהים)</strong> (סביבה לא משותפת)<br><br><strong>מרכיבי הנוסחאות:</strong><br>• <strong>rMZ (קורלציית תאומים זהים)</strong> = קורלציה בין תאומים זהים<br>• <strong>h²</strong> = התורשתיות (שחישבנו קודם)<br>• <strong>c²</strong> = שונות הסביבה המשותפת<br>• <strong>e²</strong> = שונות הסביבה הלא משותפת<br><br><strong>הגיון מאחורי e²</strong>: תאומי MZ זהים גנטית - כל הבדל ביניהם חייב לנבוע מסביבה לא משותפת. ככל שrMZ (קורלציית תאומים זהים) קטן מ-1, החלק החסר (1-rMZ (קורלציית תאומים זהים)) הוא הסביבה הלא משותפת.<br><br><strong>הגיון מאחורי c²</strong>: rMZ (קורלציית תאומים זהים) כולל גם תורשה (h²) וגם סביבה משותפת (c²). מחסירים את h² כדי לקבל רק את c²."},
  {l:"שיעור 2", q:"מה הנוסחה הכללית לקורלציה בין שני אחים?", a:"<strong>r = (h² × similarity genetic) + c²</strong><br><br><strong>מרכיבי הנוסחה:</strong><br>• <strong>r</strong> = הקורלציה הצפויה בין שני האחים<br>• <strong>h²</strong> = התורשתיות (שונות גנטית בריבוע)<br>• <strong>genetic similarity (דמיון גנטי)</strong> = אחוז הגנים המשותפים (1 ל-MZ, 0.5 ל-DZ ולאחים, 0.25 לבני דודים, 0 לזרים)<br>• <strong>c²</strong> = שונות הסביבה המשותפת<br><br><strong>דוגמאות:</strong><br>• MZ: r = h² × 1 + c² = h² + c²<br>• DZ/אחים: r = h² × 0.5 + c² = h²/2 + c²<br>• בני דודים: r = h² × 0.25 + c² = h²/4 + c² (אם חולקים סביבה)"},
  {l:"שיעור 2", q:"ההבדל בין תאומי MZ ל-DZ?", a:"<strong>MZ (מונוזיגוטיים)</strong>: זהים, 100% DNA (דנ\"א), מביצית אחת. <strong>DZ (דיזיגוטיים)</strong>: 50% DNA (דנ\"א), שתי ביציות. MZ יכולים להיות DC (פיצול 3-5 ימים, 2 כוריונים) או MC (אחרי 5-10 ימים, כוריון אחד)."},
  {l:"שיעור 2", q:"מה הבעיות במחקרי אימוץ?", a:"1. <strong>מיקום סלקטיבי</strong> - הורים מאמצים נבחרים. 2. <strong>ייצוגיות</strong> - ילדים מאומצים אינם מהאוכלוסייה הכללית. 3. <strong>היתכנות</strong> - קשה לערוך מעקב ארוך."},
  {l:"שיעור 2", q:"מהן 2 ההנחות במודל התאומים?", a:"1. <strong>הנחת סביבה שווה</strong> (equal environments) - בעייתית כי תאומים זהים מטופלים דומה יותר. 2. <strong>ייצוגיות</strong> - תאומים שונים מאוכלוסייה (נולדים מוקדם, קטנים יותר)."},
  {l:"שיעור 2", q:"מהם 3 חוקי טורקהיימר (Turkheimer (טורקהיימר))?", a:"1. כל התכונות ההתנהגותיות האנושיות תורשתיות במידה מסוימת. 2. השפעת הגדילה באותה משפחה <strong>קטנה</strong> מהשפעת הגנים. 3. חלק ממשי מהשונות אינו בגלל גנים או סביבה משותפת (קיים גורם סביבה לא משותפת)."},
  {l:"שיעור 2", q:"דוגמה לקורלציות תאומים באינטליגנציה?", a:"MZ ביחד: 0.85 (צפוי 1)<br>MZ בנפרד: 0.75<br>DZ ביחד: 0.58 (צפוי 0.5)<br>אחים ביחד: 0.45<br>הורה-ילד: 0.39<br>הורים מאמצים: 0.18 (צפוי 0)<br>= הוכחה להשפעת סביבה."},

  // שיעור 3 - גנטיקה מולקולרית
  {l:"שיעור 3", q:"מה צריך חומר גנטי לקיים?", a:"1. <strong>שכפול</strong> - בכל תאי הגוף ובין דורות. 2. <strong>שליטה בביטוי תכונות</strong> - קידוד חלבונים. 3. <strong>שולט בשינוי</strong> - מאפשר אבולוציה מבוקרת."},
  {l:"שיעור 3", q:"מה הם הזיווגים בקשרי המימן ב-DNA (דנ\"א)?", a:"<strong>A-T</strong>: 2 קישורים<br><strong>G-C</strong>: 3 קישורים (חזק יותר)"},
  {l:"שיעור 3", q:"מהי הדוגמה המרכזית של ביולוגיה מולקולרית?", a:"<strong>DNA (דנ\"א) → RNA (רנ\"א) → חלבון</strong><br>שעתוק (transcription (שעתוק)) ואז תרגום (translation (תרגום)).<br>DNA (דנ\"א): 4 אותיות (ACG (זוג נוקלאוטידי ציטוזין-גואנין)T)<br>mRNA (רנ\"א שליח) (רנ\"א): 4 אותיות (ACG (זוג נוקלאוטידי ציטוזין-גואנין)U)<br>חלבון: 20 חומצות אמינו"},
  {l:"שיעור 3", q:"מבנה הגן - מה הם Exons (אקסונים) ו-Introns (אינטרונים)?", a:"<strong>Promoter (פרומוטר)</strong>: בתחילת הגן, אנזימים מתחברים שם להתחיל שעתוק. <strong>Exons (אקסונים)</strong>: החלקים שיתורגמו לחלבונים. <strong>Introns (אינטרונים)</strong>: בין האקסונים, משועתקים אבל לא הופכים לחלבון - נחתכים."},
  {l:"שיעור 3", q:"מהי Alternative splicing (חיתוך אינטרונים)?", a:"חיתוך האינטרונים נעשה <strong>שונה במקומות שונים בגוף</strong>, וכך לאותו גן יש ביטוי שונה. אצל זבוב הפירות זה קובע אם הוא זכר או נקבה."},
  {l:"שיעור 3", q:"מה זה קודון?", a:"רצף של <strong>3 נוקלאוטידים</strong> שמתרגם חומצת אמינו אחת. יש 20 חומצות אמינו בסיסיות. tRNA (רנ\"א העברה) (רנ\"א) מצד אחד מתחבר לקודון ומצד שני משחרר חומצת אמינו."},
  {l:"שיעור 3", q:"מהן מוטציות נקודתיות? (5 סוגים)", a:"1. <strong>Missense (החלפה - חומצת אמינו אחרת)</strong>: החלפת אות → חומצה אחרת (גמדות). 2. <strong>Nonsense (עצירה מוקדמת)</strong>: עצירה מוקדמת (דיסטרופיה שרירית). 3. <strong>Deletion (מחיקה)</strong>: מחיקה (ציסטיק פיברוזיס). 4. <strong>Insertion (הוספה)</strong>: הוספה (קרוהן). 5. <strong>Duplication (כפילות)</strong>: כפילות (Charcot-Marie-Tooth)."},
  {l:"שיעור 3", q:"מהי מוטציית Sickle Cell (אנמיה חרמשית) ויתרונה?", a:"מוטציה בהמוגלובין שגורמת לאנמיה חרמשית. אלל אחד בלבד נותן <strong>חסינות יחסית ממלריה</strong> - יתרון אבולוציוני באזורים מסוימים."},
  {l:"שיעור 3", q:"מה הקשר של מוטציה לעיכול חלב?", a:"לקטוז מתפרק בגיל 7. עם המהפכה החקלאית - מוטציה אצל חלקם המשיכה לייצר לקטאז. באזורים קרים (הונגריה) - העלתה הישרדות = העברת גנים."},
  {l:"שיעור 3", q:"הבדל בין גנוטיפ, אלל ופנוטיפ?", a:"<strong>גנוטיפ</strong>: רצף ה-DNA (דנ\"א). <strong>פנוטיפ</strong>: התכונה הנצפית. <strong>אלל</strong>: צורה ספציפית של גן. הומוזיגוט = אללים זהים. הטרוזיגוט = שונים."},
  {l:"שיעור 3", q:"מה זה Pleitropy (פליוטרופיה - גן אחד משפיע על מספר תכונות)?", a:"<strong>גן אחד שמשפיע על כמה פנוטיפים</strong>. בנוסף, פנוטיפים מורכבים (complex traits (תכונות מורכבות)) מושפעים מכמה גנים."},
  {l:"שיעור 3", q:"מה זה SNP (פולימורפיזם נוקלאוטיד יחיד) ו-DRD4 (רצפטור דופמין 4)?", a:"<strong>SNP (פולימורפיזם נוקלאוטיד יחיד)</strong> = Single Nucleotide Polymorphism (פולימורפיזם) (החלפה בנוקלאוטיד יחיד). <strong>DRD4 (רצפטור דופמין 4)</strong> - גן רצפטור דופמין. אלל 7 (יותר חזרות) קושר פחות טוב דופמין → ADD, אימפולסיביות. הופיע 40-50 אלף שנה אחורה (יציאה מאפריקה)."},

  // שיעור 4
  {l:"שיעור 4", q:"מהן 4 קטגוריות סגנון הורות (Maccoby & Martin (מקובי ומרטין))?", a:"לפי דרישות וחום:<br>1. <strong>סמכותי</strong> (authoritative (סמכותי)): דורשני וחם<br>2. <strong>סמכותני</strong> (authoritarian): דורשני וקר<br>3. <strong>מפנק</strong> (indulgent): מתירני וחם<br>4. <strong>מזניח</strong> (neglectful): מתירני וקר"},
  {l:"שיעור 4", q:"מה תוצאות מחקר Janssens (יאנסנס) & Dekovic (1992)?", a:"קורלציה: הורה <strong>סמכותי</strong> → ילד חברותי. הורה <strong>סמכותני</strong> → ילד לא חברותי. <strong>אמהות</strong> משפיעות יותר על חברותיות, <strong>אבות</strong> משפיעים יותר על היעדר חברותיות."},
  {l:"שיעור 4", q:"מהי הביקורת של Judith Harris (הריס) (Nurture Assumption (הנחת הגידול))?", a:"1. בעיות מתודולוגיות - יותר מדי משתנים. 2. ההורים מספקים גם גנים, לא רק סביבה. 3. ילד משפיע על הורות (כיוון סיבתיות הפוך). 4. מחקרי תאומים מראים השפעה מעטה לסביבה משותפת. 5. <strong>קבוצת השווים משפיעה יותר</strong> - ילדי מהגרים מדברים בלי מבטא."},
  {l:"שיעור 4", q:"מהי תורשה בתגובה לסביבה (דוגמת המלון)?", a:"מחקר 1990: תאומי MZ במלון, אסור פעילות, +1000 קלוריות ליום, 84 יום. עלו 8 ק\"ג בממוצע, אבל <strong>ההבדל בין זוגות גדול מההבדל בתוך זוגות</strong> = גנטיקה משפיעה."},
  {l:"שיעור 4", q:"מה הקשר בין מס על סיגריות לתורשת עישון?", a:"מחקר ב-31 מדינות, 2060 תאומים. <strong>יותר מס → המרכיב הגנטי בעישון יורד</strong>. כשיש הגבלות חברתיות - הגנים פחות באים לידי ביטוי."},
  {l:"שיעור 4", q:"מהן 3 קורלציות גנים-סביבה (rGE)?", a:"1. <strong>Passive</strong>: גני ההורים משפיעים על הסביבה (ספרים בבית). 2. <strong>Active</strong>: אתה בוחר סביבה התואמת לגנים (טוב בשחמט → ממשיך לשחק). 3. <strong>Evocative</strong>: התנהגותך גוררת תגובה (לא נחמד → סביבה לא נחמדה)."},
  {l:"שיעור 4", q:"מה ממצאי מחקר MAOA והתעללות (Caspi (קספי))?", a:"<strong>אין אפקט עצמאי ל-MAOA</strong> או להתעללות לבד מספיק להסבר. אבל <strong>אינטראקציה</strong>: התעללות בילדות + MAOA נמוך = התנהגות אנטי-סוציאלית גבוהה. MAOA גבוה ממתן את ההשפעה. רובסטי על 4 מדדים."},

  // שיעור 5
  {l:"שיעור 5", q:"מה הקשר בין COMT (אנזים שמפרק דופמין) לקנאביס ופסיכוזה?", a:"COMT (אנזים שמפרק דופמין) מפרק דופמין. <strong>אלל VAL (אלל ואלין - פעיל יותר)</strong> = פעילות גבוהה, פחות D. <strong>אלל MET (אלל מתיונין - פחות פעיל)</strong> = פעילות נמוכה, יותר D. אינטראקציה: VAL (אלל ואלין - פעיל יותר) + עישון בגיל ההתבגרות = סיכון לפסיכוזה בגיל 26."},
  {l:"שיעור 5", q:"מה הקשר בין 5HTTLPR (גן הטרנספורטר לסרוטונין) לדיכאון?", a:"גן הטרנספורטר לסרוטונין: גרסה <strong>קצרה</strong> (פחות טרנספורטר) או <strong>ארוכה</strong>. אין אפקט עצמאי לגנוטיפ או למספר אירועים. <strong>אינטראקציה</strong>: יותר אללים קצרים + אירועי חיים מלחיצים = סיכון מוגבר לדיכאון."},
  {l:"שיעור 5", q:"מהי תיאוריית Differential Susceptibility (רגישות)?", a:"רגישות גנטית עובדת לשני הכיוונים: <strong>אותו אלל</strong> שמגביר סיכון בסביבה שלילית גם <strong>מעצים בסביבה חיובית</strong>. \"Plasticity allele (אלל פלסטי)\" - אלל שמשתנה בהתאם לסביבה. הסבר אבולוציוני - הורה רוצה ילדים מותאמים לסביבות שונות."},
  {l:"שיעור 5", q:"מה ממצאי מחקר ההוריקן בפלורידה (2007)?", a:"589 משתתפים, 38 מדינות. <strong>אלל קצר של 5HTTLPR (גן הטרנספורטר לסרוטונין) + חוויית סופה קשה + חוסר תמיכה</strong> = סיכוי גבוה ל-PTSD (הפרעת דחק פוסט-טראומטית) ודיכאון. צריך גם תמיכה וגם אלל ארוך לא לחוות אותם."},
  {l:"שיעור 5", q:"מהו Cumulative Plasticity (פלסטיות מצטברת)?", a:"אפקט מצטבר של הרבה plasticity alleles. ניסוי על 1586 מתבגרים: ככל שיש <strong>יותר אללים פלסטיים</strong>, השפעת ההורים גדולה יותר על שליטה עצמית."},
  {l:"שיעור 5", q:"הבדל בין Externalizing (מופנה החוצה) ל-Internalizing (מופנה פנימה) behavior?", a:"<strong>Externalizing (מופנה החוצה)</strong>: רגשות מופנים החוצה - כעס, וונדליזם. <strong>Internalizing (מופנה פנימה)</strong>: רגשות מופנים פנימה - חרדה, דיכאון."},

  // שיעור 6 - לחץ
  {l:"שיעור 6", q:"מי טבע את המונח Stress (לחץ) ומהי תרומתו?", a:"<strong>Hans Seyle (הנס סלייה)</strong> (1907-1982). הזריק חומרים שונים לעכברים וקיבל אותה תגובה - הבין שהלחץ מהזריקה עצמה הוא הגורם. טבע את המונח GAS (General Adaptation Syndrome)."},
  {l:"שיעור 6", q:"הבדל בין Processive (מעובד) ל-Systemic (מערכתי) stressor (גורם לחץ)?", a:"<strong>Processive (מעובד)</strong>: חיצוני, מערב עיבוד מחשבתי, לא מאיים ישיר על חיים. שונות בין אנשים. <strong>Systemic (מערכתי)</strong>: לחץ מיידי על המערכות (קפיצה לאגם קפוא). תגובות פיזיות דומות אצל כולם, מהיר יותר."},
  {l:"שיעור 6", q:"הגדרה: פחד מול חרדה?", a:"<strong>פחד</strong>: חוויה של תחושת לחץ/איום ספציפית לאירוע מיידי - קורה עכשיו. <strong>חרדה</strong>: ציפייה עתידית ללחץ + תחושת חוסר שליטה. שניהם דרך האמיגדלה."},
  {l:"שיעור 6", q:"מהי תיאוריית Tend and Befriend (טפל והתחבר) (Taylor 2000)?", a:"בנוסף ל-fight or flight (הילחם או ברח), נשים נוטות יותר ל-<strong>Tend</strong> (דאגה לגורים) ו-<strong>Befriend</strong> (התחברות). הסבר אבולוציוני: נשים בהיריון/עם ילדים, לא יכולות לברוח/להילחם. אוקסיטוצין מעורב."},
  {l:"שיעור 6", q:"מהי מערכת SAM (ציר סימפטטי-אדרנל-מדולה)?", a:"<strong>Sympathetic (סימפתטי)-Adrenal (אדרנל - יותרת הכליה)-Medulla</strong>: אינטראקציה בין מערכת סימפתטית ואדרנל. מהירה אך קצרה (דקות). מובילה לשחרור <strong>קטכולאמינים</strong> (אפינפרין, נוראפינפרין)."},
  {l:"שיעור 6", q:"מהי מערכת HPA (ציר היפותלמוס-יותרת המוח-אדרנל)?", a:"<strong>Hypothalamus-Pituitary (יותרת המוח)-Adrenal (אדרנל - יותרת הכליה)</strong>: היפותלמוס משחרר CRH (גורם משחרר קורטיקוטרופין) → היפופיזה משחררת ACTH (הורמון אדרנו-קורטיקוטרופי) → אדרנל משחרר <strong>קורטיזול</strong>. הורמונלית, איטית יותר. קורטיזול חוזר ומכבה את ההיפותלמוס (פידבק שלילי)."},
  {l:"שיעור 6", q:"מה תפקיד הקורטיזול?", a:"דואג ל<strong>הומאוסטזיס</strong>. בלחץ: מעלה רמות סוכר בדם, מדכא חיסון, מפרק שומנים/חלבונים/פחמימות. רמות גבוהות בבוקר. עולה לאט ויורד לאט."},
  {l:"שיעור 6", q:"מה ממצאי Dickerson & Kemeny (דיקרסון וקמני) (2004)?", a:"איום על <strong>self-preservation חברתי</strong> מעלה קורטיזול. גורמים מעוררים: 1. Passive/motivated, 2. <strong>Uncontrollability</strong>, 3. <strong>Social evaluative threat</strong>. TSST (מבחן לחץ חברתי טריר) = משימה משלבת דיבור מול קהל ואריתמטיקה - הכי מעלה קורטיזול."},
  {l:"שיעור 6", q:"מה הקשר של Vasopressin (ווזופרסין) ללחץ?", a:"AVP (שונות פנוטיפית כוללת) (וזופרסין) מקדם תגובת HPA (ציר היפותלמוס-יותרת המוח-אדרנל) <strong>רק בנוכחות איומים social evaluative</strong>. החדרת AVP (שונות פנוטיפית כוללת) (וזופרסין) לפני TSST (מבחן לחץ חברתי טריר) מלא העלתה קורטיזול. בלי קהל - ללא השפעה."},

  // שיעור 7 - אפיגנטיקה
  {l:"שיעור 7", q:"מהי תורת Lamarck (למארק) (1809)?", a:"1. <strong>Use and disuse</strong>: שריר משתמש - מתחזק. 2. <strong>Inheritance of acquired traits</strong>: תכונות נרכשות מורשות. דוגמת הג'ירפה - צוואר התארך עם הדורות."},
  {l:"שיעור 7", q:"הגדרה מודרנית של אפיגנטיקה?", a:"<strong>וריאציה מורשת בתפקוד גנים שלא נובעת משינויים ברצף ה-DNA (דנ\"א)</strong>. Epi = on top of / in addition to. גנים חשובים, אבל יש מעבר אליהם."},
  {l:"שיעור 7", q:"מה הם 4 סוגי תאי גזע?", a:"1. <strong>Totipotent (כל-יכולת)</strong>: יכולים גם לשליה (4 ימים ראשונים). 2. <strong>Pluripotent (רב-יכולת - בתוך העובר)</strong>: רק תוך העובר. 3. <strong>Multipotent (רב-מערכת)</strong>: מערכת ספציפית (תאי דם). 4. <strong>Unipotent (חד-יכולת/ממוקצע)</strong>: ממוקצע (נוירון)."},
  {l:"שיעור 7", q:"מהי DNA (דנ\"א) Methylation (מתילציה)?", a:"תוספת קבוצת מתיל בין <strong>C ל-G</strong> (ברצף, אותו צד). ב-promoter של גנים - <strong>משתיק</strong> את הגן. 60-90% מקשרי GC ביונקים מתילציה. \"איי CpG (זוג נוקלאוטידים ציטוזין-גואנין)\"."},
  {l:"שיעור 7", q:"מהי שינוי היסטונים (Histone (היסטון) modification)?", a:"DNA (דנ\"א) מסובב סביב היסטונים. <strong>Acetylation (אצטילציה)</strong> של זנב ההיסטון מורידה אפיניות → DNA (דנ\"א) פתוח (euchromatin) → תעתוק. <strong>Heterochromatin (הטרוכרומטין - DNA (דנ\"א) צפוף)</strong> = צפוף, תעתוק מוגבל."},
  {l:"שיעור 7", q:"מהו ניסוי עכברי Agouti?", a:"עכברים עם מוטציה בגן - צבע צהוב והשמנה. נתנו לעכברות בהיריון <strong>דיאטה עתירת מתיל</strong> - הילדים נולדו עכברים רגילים. הוכחה ש<strong>חוויית האם בהיריון משפיעה על ביטוי גנים אצל הילד</strong>."},
  {l:"שיעור 7", q:"מה ממצאי מחקר Meaney & Szyf (מיני ושיף) (Licking and Grooming)?", a:"גורי עכברים שקיבלו <strong>הרבה LG/ABN (ליקוק וטיפוח/הנקה בקשת גב)</strong> מהאם הראו פעילות HPA (ציר היפותלמוס-יותרת המוח-אדרנל) מתונה ופחות מפוחדים. Cross-fostering (אימוץ מוצלב) הוכיח שזה לא גנטי. אצל גורים של אמהות 'רעות' היה <strong>יותר מתילציה בגן GR (רצפטור גלוקוקורטיקואידים)</strong> בהיפוקמפוס. הפיך - הזרקת חומרים שמורידים מתילציה."},
  {l:"שיעור 7", q:"מה ממצאי מחקר המוחות אחרי התאבדות?", a:"3 קבוצות: התאבדו עם ילדות קשה / התאבדו ללא / מתו מסיבות אחרות. <strong>קבוצת ההתעללות</strong> הראתה רמת מתילציה גבוהה בגן GR (רצפטור גלוקוקורטיקואידים) בהיפוקמפוס - דומה לעכברים. תרגום ממצאים אנושי."},
  {l:"שיעור 7", q:"ממצאי מחקר תאומי MZ ואפיגנטיקה?", a:"80 זוגות תאומים: 65% דומים אפיגנטית, <strong>35% עם הבדלים</strong>. צעירים פחות שונים ממבוגרים. תאומים שבילו פחות זמן יחד - יותר שונים. היסטוריה רפואית שונה - יותר שונה אפיגנטית."},

  // שיעור 8 - הזדקנות
  {l:"שיעור 8", q:"רעב הולנדי 1944 - מה ההשלכות האפיגנטיות?", a:"4.5 מיליון איש קיבלו 580 קלוריות ליום (מצור גרמני). ילדים שהיו ברחם נולדו קטנים, סיכון מוגבר לסכיזופרניה. <strong>גם הילדים שלהם נולדו קטנים</strong> = השפעה בין-דורית."},
  {l:"שיעור 8", q:"מה תוחלת חיים והזדקנות אוכלוסייה?", a:"העולם מזדקן: 1) חיים יותר 2) פחות ילדים. סיבות מוות עברו מ<strong>מחלות מדבקות</strong> ל<strong>מחלות כרוניות</strong> (שבץ, השמנה) שמתפתחות לאורך שנים."},
  {l:"שיעור 8", q:"מה זה End Replication (שכפול) Problem?", a:"שכפול DNA (דנ\"א) הוא מ-5' ל-3'. הצד השני משוכפל בחתיכות עם RNA (רנ\"א) primer (פריימר - תחילון). <strong>הקצה לא משתכפל</strong> כי אין primer (פריימר - תחילון) קודם → <strong>הכרומוזום מתקצר</strong> בכל שכפול."},
  {l:"שיעור 8", q:"מהם טלומרים? מי גילתה?", a:"<strong>Elizabeth Blackburn (בלקבורן)</strong> (1978). חזרות של <strong>TTAGGG</strong> בקצוות הכרומוזום. כמו קצוות פלסטיק של שרוך - שומרים על הכרומוזום מאוחד. כשמתקצרים - התא מקבל סימן להפסיק להשתכפל."},
  {l:"שיעור 8", q:"מהו טלומראז ואיפה הוא מבוטא?", a:"אנזים עם RNA (רנ\"א) וחלבון שמוסיף חזרות טלומריות לקצה. מבוטא ב-<strong>80-90% מתאים סרטניים</strong>, תאי מין, תאי גזע, תאים עובריים. <strong>לא</strong> מבוטא ברוב התאים הסומטיים."},
  {l:"שיעור 8", q:"מהן השפעות שליליות של טלומרים קצרים?", a:"1. פחות יכולת התחדשות רקמות. 2. <strong>SASP (פנוטיפ הפרשה הקשור להזדקנות תאית)</strong> (senescence-associated secretory phenotype (פנוטיפ)): עליה בדלקת, ירידה בחיסון. 3. סיכון מוגבר לסרטן ומחלות קרדיווסקולריות."},
  {l:"שיעור 8", q:"מה גילה ניסוי האימהות לילדים חולים (Epel (אפל))?", a:"לא היה הבדל באורך טלומרים בין הקבוצות, אבל <strong>קורלציה שלילית</strong>: יותר שנות טיפול → טלומרים קצרים. גם <strong>לחץ נתפס</strong> גבוה → טלומרים קצרים."},
  {l:"שיעור 8", q:"גורמים שמשפיעים על אורך טלומרים?", a:"<strong>מקצרים</strong>: עישון, פסימיזם, בשר מעובד, לחץ, התעללות. <strong>מאריכים</strong>: ויטמינים, אומגה 3, פעילות גופנית, מדיטציה. אורח חיים בריא ממתן שחיקה."},

  // שיעור 9 - אוקסיטוצין
  {l:"שיעור 9", q:"מה ההבדל בין Oxytocin (אוקסיטוצין) ל-Vasopressin (ווזופרסין)?", a:"שניהם 9 חומצות אמינו, נבדלים ב-2 בלבד. <strong>OT</strong>: לידה (כיווץ רחם), הנקה. <strong>AVP (שונות פנוטיפית כוללת) (וזופרסין)</strong>: הומאוסטזיס מים-מלחים, מערכת עיכול. שניהם מסונתזים בהיפותלמוס (SON (גרעין סופראופטי), PVN (גרעין פאראונטריקולרי))."},
  {l:"שיעור 9", q:"מה ההבדל בין Prairie voles (נברנים) להר voles (נברנים)?", a:"<strong>Prairie voles (נברנים)</strong>: <strong>מונוגמיים</strong>, זכרים מטפחים גורים, חיים יחד עד מוות. <strong>Mountain voles (נברנים)</strong>: לא חברתיים. ההבדל: יותר רצפטורים ל-OT/AVP (שונות פנוטיפית כוללת) (וזופרסין) באזורי דופמין/reward, ו-promoter ארוך יותר של AVP (שונות פנוטיפית כוללת) (וזופרסין)."},
  {l:"שיעור 9", q:"מה ממצאי מחקר Trust Game (משחק האמון) עם אוקסיטוצין?", a:"החדרת OT (הסנפה) → המשקיע נתן יותר כסף. <strong>לא אפקט של לקיחת סיכונים</strong> כי כשהיריב היה מחשב - לא היה אפקט. ספציפי לאינטראקציה חברתית-בוטחת."},
  {l:"שיעור 9", q:"מה 3 ההשפעות של אוקסיטוצין על התנהגות חברתית?", a:"1. <strong>מוריד חרדה</strong>: פחות קורטיזול, פחות פעילות אמיגדלה. 2. <strong>מוטיבציה חברתית</strong>: יותר אמון, זיהוי פנים שמחות. 3. <strong>Social salience</strong>: יותר מבט עיניים, פחות vigilance. (התפיסה הדומיננטית היום)"},
  {l:"שיעור 9", q:"מה הצד השלילי של אוקסיטוצין?", a:"השפעתו <strong>ספציפית לקבוצת הפנים</strong>. במחקר הולנדי - הגביר <strong>bias</strong> נגד גרמנים וערבים במבחן IAT. נדיבות מוגברת רק בתוך הקבוצה."},
  {l:"שיעור 9", q:"מה הקשר בין אוקסיטוצין לאלטרואיזם במשחק הדיקטטור?", a:"וריאציות בגנים <strong>AVP (שונות פנוטיפית כוללת) (וזופרסין)R1a (גן הרצפטור לוזופרסין)</strong> ו-<strong>OXTR (גן הרצפטור לאוקסיטוצין)</strong> מנבאות נתינה. אללים ארוכים יותר → התנהגות פרו-סוציאלית יותר. SNP (פולימורפיזם נוקלאוטיד יחיד)s ב-OXTR (גן הרצפטור לאוקסיטוצין) (rs1042778, rs2268490, rs237887) מנבאים גם נתינה וגם Social Value Orientation (אוריינטציית ערכים חברתית)."},

  // שיעור 10 - אוטיזם
  {l:"שיעור 10", q:"מה 3 התחומים באבחון אוטיזם?", a:"1. <strong>יחסים חברתיים לקויים</strong> - בעיות באמפתיה/ביטויה. 2. <strong>ליקוי תקשורת</strong> - דיבור, שפה. 3. <strong>דפוסי התנהגות מוגבלים ורפטטיביים</strong>. התפרצות בערך בגיל 3."},
  {l:"שיעור 10", q:"מה ההיארעות של אוטיזם?", a:"כיום: <strong>1 ל-68 ילדים</strong> ב-ASD (אוטיזם). <strong>1 ל-400-500</strong> אוטיזם פרופר. פי 4 יותר אצל בנים (1:42 בנים, 1:189 בנות). העלייה בעיקר באבחון, אבל אולי גם חשיפה לחומרים."},
  {l:"שיעור 10", q:"מה הקורלציה לאוטיזם בין תאומים?", a:"<strong>MZ: 60-90%</strong> שיתוף (תלוי הגדרה). <strong>אח חדש: 4.5%</strong> סיכון. אוכלוסייה כללית: 0.7%. אבל הסביבה של תאומי MC זהה גם בלידה."},
  {l:"שיעור 10", q:"מה תיאוריית De novo changes?", a:"מוטציה <strong>חדשה</strong> בתא רביה (זרע/ביצית), ההורים ללא שינוי. גנטי אבל לא נורש. מסביר 15-30% מהמקרים. אסוציאציה חזקה לאוטיזם מלא."},
  {l:"שיעור 10", q:"מה תיאוריית Common variant - Common disease?", a:"שילוב של <strong>הרבה גנים</strong> שלכל אחד אפקט קטן. ספקטרום - מספר וריאנטים מספיק לאוטיזם. מסביר משפחות מורכבות וגם רצף ממאפיינים תת-קליניים."},
  {l:"שיעור 10", q:"גורמים סביבתיים לאוטיזם?", a:"1. תרופות בהיריון. 2. חשיפה למחלות. 3. <strong>סוכרת היריון אצל האם</strong>. 4. <strong>גיל הורים מעל 30</strong> (במיוחד אבא) - אולי בגלל ביציות/זרע ישנים."},
  {l:"שיעור 10", q:"מה הקשר בין אוקסיטוצין לאוטיזם?", a:"בעכברים עם בעיות חברתיות נמצא מחסור באוקסיטוצין. החדרת OT בהיריון - שיפור ארוך טווח. אצל אוטיסטים - הסנפת OT שיפרה התמסרות לאלו שמחזירים, ומבט בעיניים ובפה."},
  {l:"שיעור 10", q:"מהי תסמונת ויליאמס?", a:"מחיקה של 2 מיליון נוקלאוטידים מ<strong>כרומוזום 7q11.23</strong>. תסמינים: פנים elfin, IQ (מנת משכל) 50-70, פיגור גדילה, בעיות לב. <strong>פנוטיפ פסיכולוגי הפוך לאוטיזם</strong>: מאוד חברותיים, אמפתיה גבוהה, יכולות שפה גבוהות."},

  // שיעור 11 - טסטוסטרון
  {l:"שיעור 11", q:"מה 2 סוגי תוקפנות?", a:"1. <strong>Hostile (עוין)/Affective/Retaliatory</strong>: תגובה לאיום, fight or flight (הילחם או ברח), רגשית. 2. <strong>Predatory (טורף)/Goal oriented</strong>: סביב מטרה (רוצח שכיר), מתוכננת, פחות רגשות. רוב המחקר על הסוג הראשון."},
  {l:"שיעור 11", q:"גנטיקה ותוקפנות - אחוזים?", a:"<strong>50%</strong> מהוריאציה - גנים. <strong>10-20%</strong> - סביבה משותפת (חריג, כמעט לא רואים בתחומים אחרים)."},
  {l:"שיעור 11", q:"מה השערת הטסטוסטרון לתוקפנות?", a:"מבוסס על: הבדלי מינים, עליה בהתבגרות, סירוס שוורים מפסיק תוקפנות, מחקרי מכרסמים, אסירים אלימים עם יותר טסטוסטרון, 'roid rage'."},
  {l:"שיעור 11", q:"ממצאי מחקר Booth (בות') - שחקני טניס?", a:"1. רמות עולות לפני משחק. 2. <strong>מנצחים נשארים גבוה</strong> אחרי המשחק. 3. <strong>מפסידים יורדים</strong> מיד. גם יום אחרי. 1994 - אוהדים: ברזיל ניצחה את איטליה - אוהדים ברזילאים עם יותר טסטוסטרון."},
  {l:"שיעור 11", q:"מה ממצאי מחקר Eisenegger (אייזנגר) (Ultimatum Game (משחק האולטימטום))?", a:"121 נשים, החדרת טסטוסטרון. <strong>בפועל</strong>: לוקחות הטסטוסטרון הציעו <strong>יותר</strong> (לשפר סטטוס חברתי). <strong>לפי דעה</strong>: מי שחשב שקיבל הציע <strong>פחות</strong> (סטריאוטיפ). מראה השפעה חזקה של דעות קדומות."},
  {l:"שיעור 11", q:"מה השפעת טסטוסטרון על מבט (Terburg (טרבורג))?", a:"נשים שקיבלו טסטוסטרון <strong>הסתכלו יותר זמן על פנים כועסות</strong> (slowed gaze aversion (הסטת מבט)). מעלה דומיננטיות חברתית. אפקט לא מודע - שאלונים סובייקטיביים לא הראו הבדל."},
  {l:"שיעור 11", q:"מהי השערת האתגר (Challenge Hypothesis (השערת האתגר))?", a:"<strong>טסטוסטרון מעורר תוקפנות רק כשהוא יכול לשפר מצב חברתי או נגישות לרבייה</strong>. בציפורים - עליה בעונת רבייה. בני אדם - רמות יורדות במערכת יחסים מונוגמית עם ילדים."},
  {l:"שיעור 11", q:"השוואה: השפעות אוקסיטוצין מול טסטוסטרון?", a:"OT vs Test: <strong>אמון</strong> ↑↓, <strong>אמפתיה</strong> ↑↓, <strong>טיפול אבהי</strong> ↑↓, <strong>פעילות אמיגדלה</strong> ↓↑, <strong>חיבור אמיגדלה-OFC</strong> ↑↓. הם הופכיים בכל תחום."},

  // שיעור 12 - פוליטיקה
  {l:"שיעור 12", q:"מה 3 האפקטים שמסבירים קורלציה הורים-ילדים בפוליטיקה?", a:"1. <strong>אפקט גיל</strong>: התבגרות משנה דעות. 2. <strong>אפקט תקופה</strong>: השפעות במהלך החיים (אינטרנט). 3. <strong>אפקט קוהורט</strong>: גיל בעת אירוע משפיע. אי אפשר לבחון את שלושתם יחד."},
  {l:"שיעור 12", q:"מה נמצא במחקרי תאומים על פוליטיקה?", a:"11,000 זוגות, 4 מדינות. <strong>מפלגה ספציפית</strong> - מעט גנטי, הרבה סביבה משותפת. <strong>אידיאולוגיה כללית (ימין/שמאל), גישה דתית/אקונומית</strong> - 0.4 גנטי. <strong>השתתפות פוליטית</strong> - מאוד מורשת."},
  {l:"שיעור 12", q:"איך משתנה ההשפעה הגנטית עם הגיל בפוליטיקה?", a:"עד גיל 17-25 - תאומים זהים ולא זהים <strong>דומים בקורלציה</strong> (סביבה משותפת חזקה). אחרי עזיבת הבית - <strong>נפילה</strong> בקורלציית DZ, MZ נשארת. כלומר הגנים מקבלים יותר משקל אחרי גיל הבית."},
  {l:"שיעור 12", q:"מה ממצאי Oxley (אוקסלי) (2008) - תגובות פיזיולוגיות?", a:"מדדו EMG (אלקטרומיוגרפיה - פעילות שריר) (מצמוצים) והולכה עורית בתגובה לרעשים/תמונות. <strong>אנשים עם תגובות פיזיולוגיות חזקות יותר לאיום</strong> תמכו יותר במדיניות מתגוננת (צבא, עונש מוות). אפקט רק לנושאים <strong>חברתיים</strong>, לא אקונומיים."},
  {l:"שיעור 12", q:"מה 3 הגורמים להומוגניות בין בני זוג בפוליטיקה?", a:"1. <strong>Phenotypic assortative mating</strong>: בוחרים דומים. 2. <strong>Social homogamy</strong>: חברתיות (לאותם מקומות). 3. <strong>Assimilation</strong>: השפעה הדדית. הראשון הכי חשוב - קורלציה 0.413 לפוליטיקה (לעומת 0.128 לאישיות)."},
  {l:"שיעור 12", q:"מה הקשר בין גנים פרו-סוציאליים להצבעה?", a:"<strong>גרסאות פעילות</strong> של טרנספורטר סרוטונין ו-MAOA → <strong>אחוזי הצבעה גבוהים יותר</strong>. הגנים לא משפיעים ישירות, אלא דרך התנהגות פרו-סוציאלית."},

  // שיעור 13 - השגה חינוכית
  {l:"שיעור 13", q:"מהו פקטור G של ספירמן?", a:"מבחני אינטליגנציה <strong>בקורלציה חיובית</strong> זה עם זה אצל אותו אדם. ספירמן: יש פקטור דומיננטי שמסביר זאת = <strong>פקטור G</strong>. מבחני IQ (מנת משכל) מודדים לפחות חלק ממנו. שונות בין אנשים יציבה מגיל 10 ל-80."},
  {l:"שיעור 13", q:"מהן השלכות פנוטיפ האינטליגנציה?", a:"1. השלכות <strong>חינוכיות</strong>. 2. השלכות <strong>תעסוקתיות</strong>. 3. השלכות <strong>בריאותיות</strong> - IQ (מנת משכל) גבוה → חיים יותר זמן (פחות עבודה פיזית סיזיפית)."},
  {l:"שיעור 13", q:"מהו אפקט פלין (Flynn effect (אפקט פלין))?", a:"<strong>הציון הממוצע במבחני IQ (מנת משכל) עולה לאורך הדורות</strong>. צריך לכייל מבחנים בכל דור ל-100. ב-1932 - 100, היום אותו מבחן יתן 125. כנראה משופר חינוך וגישה לאוכל. <strong>לא נתפס במחקרי תאומים</strong> כי גנטיקה לא משתנה כך."},
  {l:"שיעור 13", q:"איך משתנה השפעת הגנים על אינטליגנציה לפי SES (מצב סוציואקונומי)?", a:"<strong>SES (מצב סוציואקונומי) גבוה</strong> → גנים אחראיים יותר לגיוון. <strong>SES (מצב סוציואקונומי) נמוך</strong> → סביבה משותפת אחראית יותר. בסביבה עשירה יותר אנשים יכולים לבטא הפוטנציאל הגנטי שלהם."},
  {l:"שיעור 13", q:"מהו GWAS (סקירת אסוציאציות בכל הגנום)?", a:"<strong>Genome Wide Association Study</strong> - גישת \"top-down\". סורקים 0.5-2.5 מיליון סממנים גנטיים. דורש מדגמים ענקיים (10,000-100,000+). מתאפשר בזכות צמצום עלויות ניתוח גנטי."},
  {l:"שיעור 13", q:"מה ממצאי GWAS (סקירת אסוציאציות בכל הגנום) להישגיות חינוכית (2016)?", a:"293,723 נבדקים. נמצאו <strong>74 אתרים משמעותיים</strong>, פזורים בכל הגנום. כל אחד מסביר ~0.02% מהשונות. <strong>אין גן לחינוך</strong>. הרבה גנים בעלי אפקט קטן."},
  {l:"שיעור 13", q:"מהו Polygenic (פוליגני/רב-גני) Score?", a:"מספר מסכם של כל הוריאנטים הגנטיים והאפקטים שלהם על תכונה. <strong>מנבא</strong> שונות חינוכית בין אחים, יכולות קוגניטיביות, תכונות אישיות, קריאה בגיל 7, שליטה ברגש. לא מנבא בריאות."},
  {l:"שיעור 13", q:"10 ממצאים נבחרים בגנטיקה התנהגותית (חוק 1 של Turkheimer (טורקהיימר))?", a:"1. כל התכונות הפסיכולוגיות מראות השפעות גנטיות. 2. אין תכונות 100% תורשתיות. 3. תורשתיות נגרמת ע\"י <strong>הרבה גנים בעלי אפקט קטן</strong>. 4. קורלציה פנוטיפים = קשר גנטי. 5. תורשתיות אינטליגנציה <strong>עולה</strong> עם הגיל. 6. יציבות בין-גילית - גנטית. 7. רוב מדידות הסביבה מראות אפקטים גנטיים."},

  // ===== מבחני עבר =====
  {l:"מבחני עבר", q:"<strong>At birth, humans are in a relatively underdeveloped state, requiring significant care and support in their early years to ensure survival (הישרדות). This classification is known as:</strong><br>a) Juvenile<br>b) Precocial (מפותח-בלידה)<br>c) Altricial (לא-מפותח-בלידה)<br>d) Immature<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> בלידה, בני אדם נמצאים במצב לא מפותח יחסית, ודורשים טיפול ותמיכה משמעותיים בשנותיהם הראשונות להישרדות. סיווג זה ידוע בשם:<br>א) צעיר ב) מפותח-בלידה (Precocial) ג) לא-מפותח-בלידה (Altricial) ד) לא בוגר</span>", a:"<strong>תשובה: c) Altricial (לא-מפותח-בלידה)</strong><br><br><strong>הסבר:</strong> Altricial (לא-מפותח-בלידה) = מינים שלא נולדים מוכנים לשרוד בעצמם (כמו בני אדם). Precocial (מפותח-בלידה) = מינים שנולדים ניידים ומפותחים (כמו סוס). Juvenile/Immature הן מילים כלליות, לא מונחים מדעיים בהקשר זה."},
  {l:"מבחני עבר", q:"<strong>The Social Brain Hypothesis has been supported by data showing a correlation between:</strong><br>a) Brain size and longevity<br>b) Brain size and ecological challenges<br>c) Neocortex size and social group size<br>d) Neocortex size and dietary complexity<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> השערת המוח החברתי נתמכה ע\"י נתונים שמראים קורלציה בין:<br>א) גודל מוח ואריכות חיים ב) גודל מוח ואתגרים אקולוגיים ג) גודל ניאו-קורטקס וגודל קבוצה חברתית ד) גודל ניאו-קורטקס ומורכבות תזונתית</span>", a:"<strong>תשובה: c) Neocortex size and social group size</strong><br><br><strong>הסבר:</strong> השערת Dunbar (דנבר) - היחס בין הניאו-קורטקס לשאר המוח גבוה יותר אצל מינים שחיים בקבוצות חברתיות גדולות. המוח החברתי התפתח כדי להתמודד עם מורכבות חברתית, לא עם אתגרים אקולוגיים או תזונה."},
  {l:"מבחני עבר", q:"<strong>If identical twins (MZs) are placed in separate classrooms when they attend school, and fraternal twins (DZs) are placed in the same classroom, a twin study investigating the effect of classroom placement on intelligence would:</strong><br>a) Be able to assess the heritability (תורשתיות) of classroom placement<br>b) Be in violation of the equal environments assumption<br>c) Be in violation of the representability (ייצוגיות) assumption<br>d) Demonstrate that MZ twins (תאומים זהים) are more adaptable than DZ twins (תאומים לא זהים)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> אם תאומים זהים (MZ) משובצים לכיתות נפרדות בבי\"ס, ותאומים לא-זהים (DZ) באותה כיתה, מחקר תאומים שבודק את השפעת השיבוץ על אינטליגנציה יהיה:<br>א) מסוגל להעריך את התורשתיות של שיבוץ ב) בניגוד להנחת הסביבה השווה ג) בניגוד להנחת הייצוגיות ד) יוכיח שתאומי MZ יותר מסתגלים</span>", a:"<strong>תשובה: b) Be in violation of the equal environments assumption</strong><br><br><strong>הסבר:</strong> הנחת הסביבה השווה (Equal Environments Assumption) דורשת שלMZ ול-DZ תהיה סביבה דומה. אם פיצלנו אותם לכיתות שונות באופן שיטתי - הסביבה שונה ויש פגיעה בהנחה."},
  {l:"מבחני עבר", q:"<strong>(Caspi (קספי) 2005 study) The finding that the maltreatment (התעללות) groups did not differ in their MAOa genotype (גנוטיפ) led to the conclusion that:</strong><br>a) Childhood maltreatment (התעללות) is correlated with antisocial (אנטי-חברתי) behavior<br>b) The severity of maltreatment (התעללות) has no influence on antisocial (אנטי-חברתי) behavior<br>c) MAOa genotype (גנוטיפ) moderate (ממתן)s the effect of maltreatment (התעללות) on antisocial (אנטי-חברתי) behavior<br>d) MAOa genotype (גנוטיפ) did not influence exposure to maltreatment (התעללות)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (מחקר Caspi (קספי) 2005) הממצא שקבוצות ההתעללות לא נבדלו בגנוטיפ MAOa הוביל למסקנה ש:<br>א) התעללות בילדות מתואמת עם התנהגות אנטי-חברתית ב) חומרת ההתעללות לא משפיעה על התנהגות אנטי-חברתית ג) הגנוטיפ ממתן את אפקט ההתעללות ד) הגנוטיפ לא השפיע על החשיפה להתעללות</span>", a:"<strong>תשובה: d) MAOa genotype (גנוטיפ) did not influence exposure to maltreatment (התעללות)</strong><br><br><strong>הסבר:</strong> השאלה ספציפית - אם הקבוצות לא נבדלו בגנוטיפ, זה אומר שהגנוטיפ <strong>לא השפיע</strong> על מי חווה התעללות (אין קורלציה גנים-סביבה). זה חשוב לביסוס הניסוי כ-GxE טהור (אינטראקציה) ולא rGE (קורלציה)."},
  {l:"מבחני עבר", q:"<strong>(5HTTLPR (גן הטרנספורטר לסרוטונין) + sensitive parenting + depression (דיכאון) graph) Which model best depicts the researcher's findings?</strong><br>a) A main effect of genotype (גנוטיפ) on depressive symptoms<br>b) Diathesis stress (פגיעות-לחץ)<br>c) Differential susceptibility (רגישות) (רגישות דיפרנציאלית)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (גרף 5HTTLPR (גן הטרנספורטר לסרוטונין) + הורות רגישה + סימפטומים דיכאוניים) איזה מודל הכי מתאר את הממצאים?<br>א) אפקט עיקרי של גנוטיפ ב) דיאתזיס-סטרס (פגיעות-לחץ) ג) רגישות דיפרנציאלית</span>", a:"<strong>תשובה: c) Differential susceptibility (רגישות) (רגישות דיפרנציאלית)</strong><br><br><strong>הסבר:</strong> בDifferential Susceptibility (רגישות) - אותו אלל (קצר) מגביר רגישות לשני הכיוונים: בהורות רעה → יותר דיכאון, בהורות טובה → פחות דיכאון. הגרף מראה קווים שמצטלבים. ב-Diathesis stress (פגיעות-לחץ) יש רק אפקט שלילי בסביבה רעה."},
  {l:"מבחני עבר", q:"<strong>Which of the following is an example of gene-environment interaction (GxE)?</strong><br>a) Genes directly causing a specific phenotype (פנוטיפ), irrespective of environment<br>b) Environmental factors moderating the impact of genetic susceptibility (רגישות) to antisocial (אנטי-חברתי) behavior<br>c) Genetic predisposition solely determining behavior<br>d) Environmental influences having no effect on genetically inherited traits<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזה מהבאים הוא דוגמה לאינטראקציית גן-סביבה (GxE)?<br>א) גנים גורמים ישירות לפנוטיפ ללא קשר לסביבה ב) גורמים סביבתיים ממתנים את אפקט הרגישות הגנטית להתנהגות אנטי-חברתית ג) נטייה גנטית קובעת לבד את ההתנהגות ד) השפעות סביבה ללא אפקט על תכונות מורשות</span>", a:"<strong>תשובה: b) Environmental factors moderating the impact of genetic susceptibility (רגישות)</strong><br><br><strong>הסבר:</strong> GxE = הסביבה <strong>ממתנת</strong> את ההשפעה של גנים, או הגנים ממתנים את ההשפעה של הסביבה. תשובות a, c, d מתארות אפקט עצמאי של גן או סביבה - לא אינטראקציה."},
  {l:"מבחני עבר", q:"<strong>What is a distinguishing characteristic of gene-environment correlations (rGE)?</strong><br>a) They involve genetic effects on individual tendencies to select or create specific environments<br>b) They describe how genes influence sensitivity to environmental factors<br>c) They occur when genetic effects are completely independent of environmental exposure<br>d) They explain environmental influences without accounting for genetic predispositions<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה מאפיין את קורלציית גן-סביבה (rGE)?<br>א) השפעות גנטיות על נטייה אישית לבחור/ליצור סביבות מסוימות ב) הן מתארות איך גנים משפיעים על רגישות לסביבה ג) הן קורות כשאפקטים גנטיים בלתי תלויים בחשיפה לסביבה ד) מסבירות השפעות סביבה בלי להתחשב בגנים</span>", a:"<strong>תשובה: a) They involve genetic effects on individual tendencies to select or create specific environments</strong><br><br><strong>הסבר:</strong> rGE = גנים יוצרים נטייה לבחירת/יצירת סביבות מסוימות (passive/active/evocative). תשובה b מתארת GxE (אינטראקציה), לא קורלציה."},
  {l:"מבחני עבר", q:"<strong>What type of behavior does \"externalizing behavior\" in children refer to?</strong><br>a) Emotional withdrawal<br>b) Negative behaviors directed outward, such as aggression (תוקפנות) and disobeying rules<br>c) Difficulty forming attachment (התקשרות)s<br>d) Increased social engagement<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> למה מתייחס \"externalizing behavior\" אצל ילדים?<br>א) התכנסות רגשית ב) התנהגויות שליליות מופנות החוצה, כמו אגרסיביות ואי-ציות ג) קושי ליצור התקשרות ד) עליה במעורבות חברתית</span>", a:"<strong>תשובה: b) Negative behaviors directed outward</strong><br><br><strong>הסבר:</strong> Externalizing (מופנה החוצה) = מופנה החוצה (אגרסיה, וונדליזם, אי-ציות). Internalizing (מופנה פנימה) = מופנה פנימה (חרדה, דיכאון, התכנסות)."},
  {l:"מבחני עבר", q:"<strong>(Belsky (בלסקי) 2016) The polygenic score predicted educational attainment (הישגיות חינוכית):</strong><br>a) More strongly in males than in females<br>b) Only in those with high socioeconomic (סוציואקונומי) status<br>c) Even after controlling for family socioeconomic (סוציואקונומי) background<br>d) Only in older generations<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Belsky (בלסקי) 2016) הציון הפוליגני ניבא הישגיות חינוכית:<br>א) חזק יותר בגברים מבנשים ב) רק במצב סוציואקונומי גבוה ג) גם לאחר בקרה על SES (מצב סוציואקונומי) משפחתי ד) רק בדורות מבוגרים</span>", a:"<strong>תשובה: c) Even after controlling for family socioeconomic (סוציואקונומי) background</strong><br><br><strong>הסבר:</strong> הציון הפוליגני מנבא הישגיות חינוכית גם אחרי שמנטרלים SES (מצב סוציואקונומי) של המשפחה - זה מראה שיש אפקט גנטי <strong>אמיתי</strong>, לא רק בגלל שעניים אמיתיים יותר חכמים גנטית."},
  {l:"מבחני עבר", q:"<strong>(Insel & Young (אינסל ויאנג)) Comparing prairie (ערבות) and montane voles (נברנים), in which brain areas do prairie (ערבות) voles (נברנים) show a higher density of oxytocin and vasopressin receptors?</strong><br>a) Reward (גמול) regions (e.g. dopamine (דופמין) activity)<br>b) Motoric and tactile regions<br>c) Visual and auditory regions<br>d) Memory regions (e.g. hippocampus)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Insel & Young (אינסל ויאנג)) בהשוואת נברני ערבות לנברני הר, באילו אזורי מוח יש לנברני הערבות צפיפות גבוהה יותר של רצפטורי OT ו-AVP (שונות פנוטיפית כוללת) (וזופרסין)?<br>א) אזורי גמול (פעילות דופמינרגית) ב) אזורים מוטוריים וטקטיליים ג) אזורים חזותיים ושמיעתיים ד) אזורי זיכרון (היפוקמפוס)</span>", a:"<strong>תשובה: a) Reward (גמול) regions (e.g. dopamine (דופמין) activity)</strong><br><br><strong>הסבר:</strong> אצל נברני הערבות (המונוגמיים) יש יותר רצפטורים של OT/AVP (שונות פנוטיפית כוללת) (וזופרסין) <strong>באזורי הגמול</strong> (ניוקליאוס אקומבנס) - זה גורם לכך שאינטראקציות חברתיות מתגמלות יותר ויוצרות זיווג קבוע."},
  {l:"מבחני עבר", q:"<strong>(Kosfeld (קוספלד) et al.) What was the key difference observed between participants in the oxytocin condition and placebo in the trust (אמון) game?</strong><br>a) Participants in oxytocin sent higher amounts of monetary units in trust (אמון) game but not in risk experiment<br>b) They showed greater trust (אמון)worthiness as trust (אמון)ees<br>c) Participants in oxytocin expected to receive more money from trust (אמון)ee<br>d) Participants in oxytocin reported improved mood<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Kosfeld (קוספלד)) מה ההבדל המרכזי בין קבוצת אוקסיטוצין לפלצבו במשחק האמון?<br>א) קבוצת OT שלחה יותר כסף במשחק האמון אך לא בניסוי הסיכון ב) הראו אמינות גבוהה יותר כנאמנים ג) ציפו לקבל יותר כסף מהנאמן ד) דיווחו על שיפור במצב הרוח</span>", a:"<strong>תשובה: a) Higher amounts in trust (אמון) game but not in risk experiment</strong><br><br><strong>הסבר:</strong> אוקסיטוצין הגביר את הנתינה במשחק האמון אבל <strong>לא</strong> השפיע על לקיחת סיכון כלכלי במשחק שבו השותף היה מחשב - מה שמוכיח שהאפקט ספציפי <strong>לאמון חברתי</strong>, לא לסיכון בכלל."},
  {l:"מבחני עבר", q:"<strong>Which of the following is an example of systemic stressor (גורם לחץ):</strong><br>a) A hand placed in icy water<br>b) Public speaking in front of a disapproving audience<br>c) A very important and difficult final exam<br>d) Both public speaking and a difficult final exam<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזה מהבאים הוא דוגמה ל-Systemic (מערכתי) stressor (גורם לחץ) (גורם לחץ מערכתי)?<br>א) יד במים קרים ב) נאום מול קהל לא תומך ג) מבחן סוף סמסטר חשוב וקשה ד) גם ב' וגם ג'</span>", a:"<strong>תשובה: a) A hand placed in icy water</strong><br><br><strong>הסבר:</strong> Systemic (מערכתי) stressor (גורם לחץ) = לחץ פיזי מיידי על המערכת. Processive (מעובד) stressor (גורם לחץ) = לחץ שעובר עיבוד מחשבתי (דיבור מול קהל, מבחן). מים קפואים פוגעים ישירות בהומאוסטזיס - אין צורך בעיבוד מחשבתי."},
  {l:"מבחני עבר", q:"<strong>(Von Dawans (פון דאוונס) et al.) What did the researchers find regarding the effects of acute stress (לחץ חריף) on social behavior?</strong><br>a) Increased levels of prosocial (פרו-חברתי) behavior across multiple tasks<br>b) Made both males and females less prosocial (פרו-חברתי)<br>c) Increased risk-taking in a gambling task<br>d) Increased the amount subjects were willing to punish the outgroup<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Von Dawans (פון דאוונס)) מה מצאו החוקרים לגבי אפקט הלחץ החריף על התנהגות חברתית?<br>א) עליה בהתנהגות פרו-סוציאלית במספר משימות ב) הפך את שני המינים לפחות פרו-סוציאליים ג) העלה לקיחת סיכונים בהימור ד) העלה את הנכונות להעניש את הקבוצה החיצונית</span>", a:"<strong>תשובה: a) Increased levels of prosocial (פרו-חברתי) behavior</strong><br><br><strong>הסבר:</strong> Von Dawans (פון דאוונס) בדקו גברים בלחץ - וגילו שהם הפכו <strong>יותר פרו-סוציאליים</strong> (חולקים יותר, סומכים יותר). זה תומך בהיפותזת \"Tend and Befriend (טפל והתחבר)\" של טיילור גם לגברים, לא רק לנשים."},
  {l:"מבחני עבר", q:"<strong>Which is a structural (מבני) aspect of social connection?</strong><br>a) Whether or not a person is married<br>b) Receiving a hug from a good friend<br>c) Having a bed to sleep in following a natural disaster<br>d) A person's subjective feeling of satisfaction with their social relationships<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזה היבט הוא היבט מבני של חיבור חברתי?<br>א) האם האדם נשוי או לא ב) חיבוק מחבר טוב ג) מיטה לישון בה אחרי אסון טבע ד) תחושה סובייקטיבית של שביעות רצון מהיחסים</span>", a:"<strong>תשובה: a) Whether or not a person is married</strong><br><br><strong>הסבר:</strong> מבני (Structural (מבני)) = עובדה אובייקטיבית על מבנה הקשרים החברתיים (סטטוס משפחתי). תשובה b היא תמיכה רגשית, c תמיכה אינסטרומנטלית, d תמיכה סובייקטיבית."},
  {l:"מבחני עבר", q:"<strong>Which type of cells (תאים) are least likely to correspond with the upper curve (telomere length over cell divisions)?</strong><br>a) Stem cells (תאי גזע)<br>b) Somatic cells (תאי גוף) (not stem cells (תאי גזע))<br>c) Cancer cells (תאי סרטן)<br>d) Cells expressing telomerase<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזה תא הכי פחות יתאים לעקומה העליונה (אורך טלומר לאורך חלוקות תא)?<br>א) תאי גזע ב) תאים סומטיים (לא תאי גזע) ג) תאי סרטן ד) תאים שמבטאים טלומראז</span>", a:"<strong>תשובה: b) Somatic cells (תאי גוף) (not stem cells (תאי גזע))</strong><br><br><strong>הסבר:</strong> תאי גזע, תאי סרטן ותאים שמבטאים טלומראז שומרים על אורך הטלומרים שלהם (עקומה עליונה). תאים סומטיים <strong>לא</strong> מבטאים טלומראז ולכן הטלומרים שלהם מתקצרים בכל חלוקה."},
  {l:"מבחני עבר", q:"<strong>Which statement about ASD (אוטיזם) aligns with the \"common disease - common variant\" theory?</strong><br>a) Each genetic variant contributes a small additive effect to the disorder's phenotype (פנוטיפ)<br>b) Most genes associated with ASD (אוטיזם) are expressed during fetal development (התפתחות עוברית)<br>c) ASD (אוטיזם) is highly correlated with maternal age<br>d) All of the above<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזו טענה על ASD (אוטיזם) מתאימה לתיאוריית \"מחלה נפוצה - וריאנט נפוץ\"?<br>א) כל וריאנט גנטי תורם אפקט מצטבר קטן ב) רוב הגנים מתבטאים בהתפתחות העובר ג) ASD (אוטיזם) מאוד מתואם עם גיל האם ד) כל הנ\"ל</span>", a:"<strong>תשובה: a) Each genetic variant contributes a small additive effect</strong><br><br><strong>הסבר:</strong> תיאוריית Common Variant (וריאנט נפוץ) - הרבה גנים נפוצים בעלי אפקט קטן שמצטברים יחד. תשובות b ו-c נוגעות לגיל ולהתפתחות, לא לאופן הירושה הגנטית."},
  {l:"מבחני עבר", q:"<strong>Current research characterizes ASD (אוטיזם) as:</strong><br>a) A genetic disorder caused by a constellation of common disease genes<br>b) A disorder that is genetic but not inherited, likely due to de novo (חדש - מוטציה ספונטנית) events<br>c) A disorder primarily genetic but also influenced by environmental factors (e.g. maternal age)<br>d) All of the above<br>e) None of the above<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מחקר עכשווי מאפיין את ASD (אוטיזם) כ:<br>א) הפרעה גנטית בגלל מערך של גנים נפוצים ב) הפרעה גנטית שלא נורשת, סביר שמ-de novo (חדש - מוטציה ספונטנית) ג) הפרעה גנטית בעיקרה אך גם מושפעת מהסביבה (כגון גיל אם) ד) כל הנ\"ל ה) אף אחד מהנ\"ל</span>", a:"<strong>תשובה: c) Primarily genetic but also influenced by environmental factors</strong><br><br><strong>הסבר:</strong> אוטיזם הוא בעיקר גנטי (60-90% תורשתי) אבל יש גם השפעות סביבתיות כמו גיל ההורים, סוכרת היריון ועוד. אין הסכמה על תיאוריה אחת בלעדית - זה שילוב."},
  {l:"מבחני עבר", q:"<strong>Which is INCORRECT about testosterone (טסטוסטרון), aggression (תוקפנות), and competition (תחרות)?</strong><br>a) Testosterone (טסטוסטרון) administration studies suggest it is more closely linked to aggression (תוקפנות) than directly to social status (סטטוס חברתי)<br>b) Testosterone (טסטוסטרון) levels rise before a competition (תחרות) but drop significantly if the competitor loses<br>c) Testosterone (טסטוסטרון) promotes investment in long-term bonding over mating efforts<br>d) Higher testosterone (טסטוסטרון) levels correlated with greater likelihood of drug use (שימוש בסמים) and criminal (פלילי) behavior<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה לא נכון לגבי טסטוסטרון, אגרסיה ותחרות?<br>א) מחקרי החדרה מראים שהוא קשור יותר לאגרסיה מאשר ישירות לסטטוס חברתי ב) רמות עולות לפני תחרות אך יורדות אם המתחרה מפסיד ג) טסטוסטרון מקדם השקעה בקשר ארוך טווח על פני מאמצי זיווג ד) רמות גבוהות בקורלציה עם שימוש בסמים והתנהגות פלילית</span>", a:"<strong>תשובה: a) קשור יותר לתוקפנות מאשר לסטטוס - INCORRECT</strong><br><br><strong>הסבר:</strong> מחקרים עם החדרת טסטוסטרון מראים שהוא קשור <strong>יותר לסטטוס חברתי</strong> מאשר ישירות לתוקפנות. הוא גורם להתנהגות שמשפרת סטטוס - שלפעמים זו תוקפנות אבל גם נדיבות. גם c לא נכונה (טסטוסטרון יורד אחרי הורות)."},
  {l:"מבחני עבר", q:"<strong>(Terburg (טרבורג)) What was a key finding in the study on testosterone (טסטוסטרון) and social dominance (דומיננטיות חברתית)?</strong><br>a) Testosterone (טסטוסטרון) increased gaze aversion (הסטת מבט) from angry faces (פנים כועסות)<br>b) Testosterone (טסטוסטרון) slowed gaze aversion (הסטת מבט) to angry faces (פנים כועסות)<br>c) Testosterone (טסטוסטרון) decreased gaze aversion (הסטת מבט) to happy faces<br>d) Testosterone (טסטוסטרון) had no impact on gaze behavior<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Terburg (טרבורג)) מה היה ממצא מרכזי במחקר טסטוסטרון ודומיננטיות חברתית?<br>א) טסטוסטרון הגביר הסטת מבט מפנים כועסות ב) טסטוסטרון האט הסטת מבט מפנים כועסות ג) הוריד הסטת מבט מפנים שמחות ד) ללא אפקט על מבט</span>", a:"<strong>תשובה: b) Testosterone (טסטוסטרון) slowed gaze aversion (הסטת מבט) to angry faces (פנים כועסות)</strong><br><br><strong>הסבר:</strong> טסטוסטרון מעלה דומיננטיות חברתית - אנשים שקיבלו אותו <strong>הסתכלו זמן ארוך יותר על פנים כועסות</strong> במקום להסיט את המבט. אפקט לא מודע."},
  {l:"מבחני עבר", q:"<strong>(Alford (אלפורד) et al., 10,320 individuals) What did researchers discover regarding political attitude correlations among spouses (בני זוג)?</strong><br>a) Spouses are significantly more similar in political views than in personality traits<br>b) Individuals with right-wing political views tend to marry similar partners, but not left-wing<br>c) The more time spouses (בני זוג) spend together, the more divergent their political attitudes (עמדות פוליטיות) become<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Alford (אלפורד) 10,320 משתתפים) מה מצאו החוקרים על קורלציה פוליטית בין בני זוג?<br>א) בני זוג דומים יותר בעמדות פוליטיות מאשר בתכונות אישיות ב) אנשים ימניים נוטים להתחתן עם דומים, אך לא שמאלנים ג) ככל שבני הזוג מבלים יותר יחד - הם מתרחקים פוליטית</span>", a:"<strong>תשובה: a) Spouses are more similar in political views than personality traits</strong><br><br><strong>הסבר:</strong> נמצאה קורלציה של ~0.4 בפוליטיקה לעומת רק 0.13 באישיות. הסיבה העיקרית היא <strong>Phenotypic assortative mating</strong> - אנשים בוחרים בני זוג דומים בדעות פוליטיות (לא הטמעה אחרי החתונה)."},
  {l:"מבחני עבר", q:"<strong>What is the \"cohort effect\" in political attitudes (עמדות פוליטיות)?</strong><br>a) The changes in an individual's views as they age<br>b) The influence of events that vary across time periods<br>c) The impact of being born at the same time and exposed to similar societal events<br>d) The influence of family socialization (סוציאליזציה/חיברות)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מהו \"אפקט הקוהורט\" בעמדות פוליטיות?<br>א) שינויי דעות עם הגיל ב) השפעת אירועים שמשתנים בין תקופות ג) השפעת להיוולד באותו זמן ולהיחשף לאירועים חברתיים דומים ד) השפעת חברות משפחתית</span>", a:"<strong>תשובה: c) Born at the same time and exposed to similar societal events</strong><br><br><strong>הסבר:</strong> Cohort effect (אפקט קוהורט) = להיוולד באותה תקופה, לחוות אותם אירועים בגיל דומה. תשובה a = Age effect (אפקט גיל). תשובה b = Period effect (אפקט תקופה). שלושת אלו לא ניתנים להפרדה לחלוטין במחקר."},
  {l:"מבחני עבר", q:"<strong>What does the biosocial constructionist theory by Eagly and Wood propose?</strong><br>a) Sex differences are entirely biological<br>b) Behavior patterns result from a mix of biological and social processes tailored to contemporary conditions<br>c) Social norms fully override biological processes in behavior<br>d) Nature and nurture operate independently in shaping sex differences (הבדלי מין)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה מציעה תיאוריית Eagly & Wood (איגלי ווד) (קונסטרוקטיביזם ביו-חברתי)?<br>א) הבדלי מינים ביולוגיים לחלוטין ב) דפוסי התנהגות תוצר של שילוב ביולוגיה ותהליכים חברתיים מותאמים ג) נורמות חברתיות מבטלות תהליכים ביולוגיים ד) טבע וגידול פועלים בנפרד</span>", a:"<strong>תשובה: b) Mix of biological and social processes</strong><br><br><strong>הסבר:</strong> תיאוריה של Eagly & Wood (איגלי ווד) - הבדלי מינים נובעים מאינטראקציה בין ביולוגיה (גודל גוף, פוריות) לבין מבנה חברתי שהתאים את עצמו לביולוגיה. לא ביולוגיה טהורה ולא חברה טהורה."},
  {l:"מבחני עבר", q:"<strong>Which of the following is true regarding the genome-wide association study (GWAS (סקירת אסוציאציות בכל הגנום))?</strong><br>a) It tests a specific hypothesis regarding a small set of genes<br>b) It is based on prior knowledge of biological function<br>c) It requires very large sample sizes<br>d) It does not require statistical correction for multiple testing<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה נכון לגבי GWAS (סקירת אסוציאציות בכל הגנום) (סקירת אסוציאציות בכל הגנום)?<br>א) בודקת השערה ספציפית על קבוצת גנים קטנה ב) מבוססת על ידע מוקדם על תפקוד ביולוגי ג) דורשת מדגמים מאוד גדולים ד) לא דורשת תיקון סטטיסטי לבדיקות מרובות</span>", a:"<strong>תשובה: c) It requires very large sample sizes</strong><br><br><strong>הסבר:</strong> GWAS (סקירת אסוציאציות בכל הגנום) היא גישת \"top-down\" - <strong>לא</strong> משערים השערה ספציפית, סורקים מיליוני סממנים בכל הגנום. זה דורש מדגמים של עשרות עד מאות אלפי נבדקים בשביל מובהקות סטטיסטית."},
  {l:"מבחני עבר", q:"<strong>In order to qualify to adopt a child, parents need to show no severe psychiatric illness, violence (אלימות) or criminal (פלילי) behavior. This creates a bias in adoption studies known as:</strong><br>a) Equal environments (סביבה שווה) assumption<br>b) Selective placement (השמה סלקטיבית)<br>c) Feasibility (היתכנות)<br>d) Representativeness (ייצוגיות)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> כדי לאמץ ילד, הורים צריכים להציג שאין מחלת נפש קשה, אלימות או היסטוריה פלילית. זה יוצר הטיה במחקרי אימוץ הידועה כ:<br>א) הנחת סביבה שווה ב) מיקום סלקטיבי ג) היתכנות ד) ייצוגיות</span>", a:"<strong>תשובה: b) Selective placement (השמה סלקטיבית)</strong><br><br><strong>הסבר:</strong> Selective placement (השמה סלקטיבית) = הורים מאמצים נבחרים עם מאפיינים מסוימים (יציבים, חסרי בעיות) - לכן הם לא מייצגים את כלל האוכלוסייה ויוצרים הטיה במחקרי אימוץ."},
  {l:"מבחני עבר", q:"<strong>Which is NOT consistent with Plomin (פלומין)'s Top 10 replicated findings from behavioral genetics?</strong><br>a) Personality trait of extraversion is stable from childhood to adulthood largely due to genetic factors<br>b) Number of stressful events (אירועים מלחיצים) a person experiences is partially heritable<br>c) Heritability (תורשתיות) of intelligence is greater in childhood compared to adolescence<br>d) For most phenotype (פנוטיפ)s, effects of unshared environment (סביבה משותפת) (סביבה לא משותפת) are greater than shared environment (סביבה משותפת)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה לא עקבי עם 10 הממצאים המובילים של פלומין בגנטיקה התנהגותית?<br>א) מוחצנות יציבה מילדות לבגרות בעיקר בגלל גנים ב) מספר אירועי חיים מלחיצים תורשתי חלקית ג) תורשתיות אינטליגנציה גבוהה יותר בילדות מאשר בגיל ההתבגרות ד) ברוב הפנוטיפים, סביבה לא משותפת חזקה יותר ממשותפת</span>", a:"<strong>תשובה: c) Heritability (תורשתיות) of intelligence is greater in childhood than adolescence</strong><br><br><strong>הסבר:</strong> ההפך הוא הנכון! לפי פלומין - <strong>תורשתיות אינטליגנציה עולה עם הגיל</strong>. בילדות יש יותר השפעת הסביבה, בבגרות יותר ביטוי גנטי."},
  {l:"מבחני עבר", q:"<strong>During the process of transcription (שעתוק) from DNA (דנ\"א) to mRNA (רנ\"א שליח) (רנ\"א), which parts of the gene are transcribed?</strong><br>a) Exons (אקסונים)<br>b) Introns (אינטרונים)<br>c) Promoter (פרומוטר) region<br>d) All of the above<br>e) Exons (אקסונים) and introns only<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> במהלך השעתוק מ-DNA (דנ\"א) ל-mRNA (רנ\"א שליח) (רנ\"א), אילו חלקים של הגן משועתקים?<br>א) אקסונים ב) אינטרונים ג) אזור הפרומוטר ד) כל הנ\"ל ה) רק אקסונים ואינטרונים</span>", a:"<strong>תשובה: e) Exons (אקסונים) and introns only</strong><br><br><strong>הסבר:</strong> בשעתוק - גם אקסונים וגם אינטרונים מועתקים ל-mRNA (רנ\"א שליח) (רנ\"א). רק אחר כך, ב-splicing (חיתוך אינטרונים), האינטרונים נחתכים ורק האקסונים מתורגמים לחלבון. הפרומוטר הוא רק מקום הזיהוי - <strong>לא</strong> משועתק."},
  {l:"מבחני עבר", q:"<strong>Individuals carrying the A allele at rs671 SNP (פולימורפיזם נוקלאוטיד יחיד) of aldehyde dehydrogenase (אלדהיד דהידרוגנאז) gene show a typical red flushing (סומק) of the face when drinking alcohol. These individuals are:</strong><br>a) Less likely to become alcohol dependent<br>b) More likely to be shy and introverted<br>c) Less likely to develop heart disease at an early age<br>d) More resistant to malaria (מלריה)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> אנשים נושאי האלל A ב-rs671 (גן אלדהיד דהידרוגנאז) מראים סומק אדום בפנים בשתיית אלכוהול. אנשים אלה:<br>א) פחות נוטים להתמכרות לאלכוהול ב) יותר ביישנים ומופנמים ג) פחות נוטים למחלות לב בגיל צעיר ד) עמידים יותר למלריה</span>", a:"<strong>תשובה: a) Less likely to become alcohol dependent</strong><br><br><strong>הסבר:</strong> מוטציה זו שכיחה אצל אסייתים - האנזים פחות יעיל בפירוק אלכוהול → הצטברות אצטאלדהיד → סומק ובחילה. זו דחייה טבעית לאלכוהול → סיכוי נמוך יותר להתמכרות. (תפקיד אבולוציוני מועיל)"},
  {l:"מבחני עבר", q:"<strong>According to Maccoby & Martin (מקובי ומרטין), authoritative (סמכותי) parenting is characterized by ___, while indifferent (מתעלם/מזניח) parenting is characterized by ___:</strong><br>a) demandingness (דרישה) and acceptance (קבלה) / rejection (דחייה) and permissiveness (מתירנות)<br>b) demandingness (דרישה) and rejection (דחייה) / acceptance (קבלה) and permissiveness (מתירנות)<br>c) rejection (דחייה) and permissiveness (מתירנות) / demandingness (דרישה) and rejection (דחייה)<br>d) acceptance (קבלה) and permissiveness (מתירנות) / demandingness (דרישה) and acceptance (קבלה)<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> לפי Maccoby & Martin (מקובי ומרטין), הורות סמכותית מאופיינת ב__, והורות מזניחה מאופיינת ב__:<br>א) דרישה וקבלה / דחייה ומתירנות ב) דרישה ודחייה / קבלה ומתירנות ג) דחייה ומתירנות / דרישה ודחייה ד) קבלה ומתירנות / דרישה וקבלה</span>", a:"<strong>תשובה: a) demandingness (דרישה) and acceptance (קבלה) / rejection (דחייה) and permissiveness (מתירנות)</strong><br><br><strong>הסבר:</strong> Authoritative (סמכותי) = חם + דורשני (חיובי). Indifferent (מתעלם) (Neglectful (מזניח)) = קר + מתירני (שלילי). זוכרים: סמכותי \"דורש ומקבל\", מזניח \"דוחה ולא אכפת\"."},
  {l:"מבחני עבר", q:"<strong>Children with conduct disorder (הפרעת התנהגות) seek out antisocial (אנטי-חברתי) peers; exposure to such peers increases risk of developing antisocial (אנטי-חברתי) behavior. Which type of gene-environment correlation is this?</strong><br>a) Passive<br>b) Evocative<br>c) Active<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> ילדים עם הפרעת התנהגות מחפשים חברים אנטי-סוציאליים, וחשיפה לחברים כאלה מעלה סיכון להתפתחות התנהגות אנטי-סוציאלית. איזו קורלציית גן-סביבה זו?<br>א) פסיבית ב) מעוררת (Evocative) ג) אקטיבית</span>", a:"<strong>תשובה: c) Active</strong><br><br><strong>הסבר:</strong> Active rGE - <strong>הילד עצמו בוחר</strong> סביבה שתואמת לנטיותיו (חברים אנטי-סוציאליים). Passive = ההורים יוצרים את הסביבה. Evocative = ההתנהגות גוררת תגובות מסביבה."},
  {l:"מבחני עבר", q:"<strong>Parents with poor self regulation pass on a genotype (גנוטיפ) not supporting self-regulation to their children, AND also provide a more chaotic home environment. Which type of gene-environment correlation?</strong><br>a) Passive<br>b) Evocative<br>c) Active<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> הורים עם ויסות עצמי לקוי מורישים גנוטיפ דומה לילדיהם וגם מספקים בית כאוטי. איזו קורלציית גן-סביבה?<br>א) פסיבית ב) מעוררת ג) אקטיבית</span>", a:"<strong>תשובה: a) Passive</strong><br><br><strong>הסבר:</strong> Passive rGE - ההורים <strong>מספקים גם גנים וגם סביבה</strong> שתואמים זה לזה (שניהם תורמים לפנוטיפ באותו כיוון). הילד פסיבי - לא בחר סביבה ולא יצר תגובות."},
  {l:"מבחני עבר", q:"<strong>Which is NOT true regarding cortisol (קורטיזול)?</strong><br>a) It peaks about 15 minutes after the onset of the stressor (גורם לחץ)<br>b) It is secreted from the adrenal gland<br>c) Its levels are higher in the morning than afternoon<br>d) It leads to increased inflammation and immune response<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה לא נכון לגבי קורטיזול?<br>א) משיא ~15 דקות מהתחלת הלחץ ב) מופרש מבלוטת האדרנל ג) רמות גבוהות יותר בבוקר מאחה\"צ ד) גורם לעליה בדלקת ובתגובה חיסונית</span>", a:"<strong>תשובה: d) Increased inflammation and immune response</strong><br><br><strong>הסבר:</strong> ההפך - קורטיזול <strong>מדכא</strong> דלקת ופעילות מערכת החיסון! זו אחת הסיבות שלחץ כרוני מזיק - מערכת החיסון מדוכאת. כל השאר נכונים (שיא ב-15 דק', מאדרנל, גבוה בבוקר)."},
  {l:"מבחני עבר", q:"<strong>Which can lead to silencing (השתקה) of a gene?</strong><br>a) When the start codon (קודון התחלה) is located in a CpG (זוג נוקלאוטידים ציטוזין-גואנין) island<br>b) When the DNA (דנ\"א) is in the form of euchromatin<br>c) When the promoter of the gene is located in a CpG (זוג נוקלאוטידים ציטוזין-גואנין) site<br>d) When histone acetylation occurs<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה יכול להוביל להשתקה של גן?<br>א) קודון התחלה באי CpG (זוג נוקלאוטידים ציטוזין-גואנין) ב) DNA (דנ\"א) בצורת אאוכרומטין ג) פרומוטר הגן באתר CpG (זוג נוקלאוטידים ציטוזין-גואנין) ד) אצטילציה של היסטונים</span>", a:"<strong>תשובה: c) When the promoter is located in a CpG (זוג נוקלאוטידים ציטוזין-גואנין) site</strong><br><br><strong>הסבר:</strong> השתקת גן בעיקר ע\"י <strong>מתילציה של פרומוטר באיי CpG (זוג נוקלאוטידים ציטוזין-גואנין)</strong>. אם הפרומוטר באתר CpG (זוג נוקלאוטידים ציטוזין-גואנין) - הוא יכול לעבור מתילציה ולהשתיק את הגן. Euchromatin (אאוכרומטין - DNA (דנ\"א) פתוח) = פתוח (לא משתיק), Acetylation (אצטילציה) = פותח (לא משתיק)."},
  {l:"מבחני עבר", q:"<strong>Which is NOT true regarding epigenetic (אפיגנטי) research in MZ twins (תאומים זהים)?</strong><br>a) Epigenetic differences between MZ twins (תאומים זהים) usually seen in older ages<br>b) Epigenetic differences in childhood found specifically for methylation and not histone acetylation<br>c) Among majority of MZ twins (תאומים זהים), epigenetic (אפיגנטי) markers were highly similar<br>d) Twins who grew up together show less epigenetic (אפיגנטי) differences<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה לא נכון על מחקר אפיגנטיקה בתאומי MZ?<br>א) הבדלים אפיגנטיים בד\"כ נראים בגילים מבוגרים ב) הבדלי ילדות נמצאו ספציפית למתילציה ולא לאצטילציה ג) רוב תאומי MZ עם סמנים אפיגנטיים דומים מאוד ד) תאומים שגדלו יחד מראים פחות הבדלים</span>", a:"<strong>תשובה: b) Childhood differences only for methylation</strong><br><br><strong>הסבר:</strong> זה לא מה שמצאו במחקרים - הבדלים אפיגנטיים בילדות נראו <strong>גם במתילציה וגם באצטילציה</strong>. כל היתר נכונים: 65% דמיון, יותר הבדלים במבוגרים, פחות אצל מי שגר ביחד."},
  {l:"מבחני עבר", q:"<strong>What is the main reason that telomeres shorten with time?</strong><br>a) Telomerase (טלומראז) activation<br>b) The end replication (שכפול) problem (בעיית שכפול הקצה)<br>c) The Hayflick Limit (גבול הייפליק)<br>d) Stress (לחץ)ful life events<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> מה הסיבה העיקרית שטלומרים מתקצרים עם הזמן?<br>א) הפעלת טלומראז ב) בעיית שכפול הקצה ג) גבול הייפליק ד) אירועי חיים מלחיצים</span>", a:"<strong>תשובה: b) The end replication (שכפול) problem (בעיית שכפול הקצה)</strong><br><br><strong>הסבר:</strong> Polymerase (פולימראז) לא יכול לשכפל את הקצה של הכרומוזום (אין primer (פריימר - תחילון) קודם) - לכן הכרומוזום מתקצר בכל חלוקה. Hayflick Limit (גבול הייפליק) = התוצאה (הגבול ל-50 חלוקות), לא הסיבה. Stress (לחץ) מאיץ אך לא הגורם הבסיסי."},
  {l:"מבחני עבר", q:"<strong>(Epel (אפל) et al.) What variable was found correlated with shorter telomeres?</strong><br>a) Perceived stress<br>b) Number of years mothering a chronically ill child<br>c) Mother's age<br>d) All of the above<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Epel (אפל)) איזה משתנה נמצא בקורלציה עם טלומרים קצרים יותר?<br>א) לחץ נתפס ב) שנות טיפול בילד חולה כרוני ג) גיל האם ד) כל הנ\"ל</span>", a:"<strong>תשובה: d) All of the above</strong><br><br><strong>הסבר:</strong> מחקר Epel (אפל) המפורסם - אמהות לילדים חולים. גם <strong>שנות הטיפול</strong>, גם <strong>הלחץ הסובייקטיבי הנתפס</strong>, וגם <strong>הגיל</strong> נמצאו בקורלציה שלילית עם אורך הטלומרים."},
  {l:"מבחני עבר", q:"<strong>Genetic variation in the oxytocin receptor (OXTR (גן הרצפטור לאוקסיטוצין)) gene is associated with gene expression in brain areas associated with ___, and density of oxytocin receptors are higher in the ___ vole.</strong><br>a) Serotonin / prairie (ערבות)<br>b) Serotonin / montane<br>c) Dopamine / prairie (ערבות)<br>d) Dopamine / montane<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> וריאציה גנטית ב-OXTR (גן הרצפטור לאוקסיטוצין) מקושרת לאזורי מוח של __, וצפיפות רצפטורים גבוהה יותר ב-__:<br>א) סרוטונין / ערבות ב) סרוטונין / הר ג) דופמין / ערבות ד) דופמין / הר</span>", a:"<strong>תשובה: c) Dopamine / prairie (ערבות)</strong><br><br><strong>הסבר:</strong> אצל נברני הערבות (prairie (ערבות) - מונוגמיים) יש יותר רצפטורים של אוקסיטוצין באזורי <strong>דופמין</strong> (גמול). זה גורם לכך שזיווג עם בן זוג מסוים מתגמל גמול ויוצר קשר ארוך טווח."},
  {l:"מבחני עבר", q:"<strong>Which finding does NOT directly support the 'common disease - common variant' hypothesis regarding autism?</strong><br>a) Families have multiple children with ASD (אוטיזם)<br>b) Most genes associated with ASD (אוטיזם) are expressed during fetal development (התפתחות עוברית)<br>c) Many people might have some level of autistic traits but not diagnosed<br>d) Individuals carrying a large number of SNP (פולימורפיזם נוקלאוטיד יחיד)s associated with ASD (אוטיזם) have greater autism severity<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> איזה ממצא לא תומך בהיפותזת \"מחלה נפוצה-וריאנט נפוץ\" באוטיזם?<br>א) משפחות עם מספר ילדים על הספקטרום ב) רוב הגנים מתבטאים בעובר ג) הרבה אנשים עם תכונות אוטיסטיות שלא מאובחנים ד) נשאי הרבה SNP (פולימורפיזם נוקלאוטיד יחיד)s - חומרת אוטיזם גבוהה יותר</span>", a:"<strong>תשובה: b) Genes expressed during fetal development (התפתחות עוברית)</strong><br><br><strong>הסבר:</strong> זמן הביטוי של הגנים <strong>לא קשור</strong> לאופן הירושה. תשובות a, c, d תומכות בהיפותזה: שילוב גנים, ספקטרום באוכלוסייה, אפקט מצטבר של SNP (פולימורפיזם נוקלאוטיד יחיד)s."},
  {l:"מבחני עבר", q:"<strong>(Eisenegger (אייזנגר), Fehr et al.) Examining testosterone (טסטוסטרון) effects in the Ultimatum Game (משחק האולטימטום) found that:</strong><br>a) Subjects receiving testosterone (טסטוסטרון) were more likely to reject unfair offers<br>b) Subjects receiving testosterone (טסטוסטרון) proposed larger offers<br>c) Subjects believing they received testosterone (טסטוסטרון) gave more than those believing they received placebo<br>d) Subjects were able to tell if they received testosterone (טסטוסטרון) or placebo<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> (Eisenegger (אייזנגר)) במחקר טסטוסטרון במשחק האולטימטום נמצא ש:<br>א) מקבלי טסטוסטרון דחו יותר הצעות לא הוגנות ב) מקבלי טסטוסטרון הציעו הצעות גדולות יותר ג) מי שחשב שקיבל טסטוסטרון נתן יותר מאלה שחשבו שקיבלו פלצבו ד) הנבדקים זיהו אם קיבלו טסטוסטרון או פלצבו</span>", a:"<strong>תשובה: b) Subjects receiving testosterone (טסטוסטרון) proposed larger offers</strong><br><br><strong>הסבר:</strong> בפועל - טסטוסטרון העלה הצעות (לשפר סטטוס חברתי). אבל <strong>מי שחשב</strong> שקיבל טסטוסטרון נתן <strong>פחות</strong> (סטריאוטיפ של אגרסיה). מראה כוחן של דעות קדומות."},
  {l:"מבחני עבר", q:"<strong>Famous expression: \"If you are not a liberal at 25, you have no heart. If you are not a conservative at 35, you have no brain.\" This is an example of which type of effect?</strong><br>a) Period Effect<br>b) Cohort Effect<br>c) Age Effect<br><br><span style='color:#555;font-size:.92em;border-top:1px dashed #bbb;padding-top:8px;display:inline-block'><strong>תרגום:</strong> ביטוי מפורסם: \"אם אינך ליברל בגיל 25 - אין לך לב. אם אינך שמרן בגיל 35 - אין לך מוח\". איזה אפקט?<br>א) אפקט תקופה ב) אפקט קוהורט ג) אפקט גיל</span>", a:"<strong>תשובה: c) Age Effect</strong><br><br><strong>הסבר:</strong> Age effect (אפקט גיל) = שינויים בעמדות עם הגיל (התבגרות → שמרנות). Period = השפעת תקופה היסטורית. Cohort = להיוולד באותה תקופה. הציטוט מתאר שינוי <strong>בגיל ספציפי</strong>."},
